// ── NEW DELIVERY WITH PHOTO CAPTURE ──
// ══════════════════════════════════════
function NewDeliveryModal({onClose}) {
  const {data,addDelivery,updateOrder,showToast,saveDeliveryTicket,getOrderDelivered,getOrderDeliveryCount,isOrderFullyDelivered} = useApp();
  const [mode,setMode] = useState('individual');
  const [selectedOrder,setSelectedOrder] = useState('');
  const [selectedGroup,setSelectedGroup] = useState('');
  const [selectedGroupOrders,setSelectedGroupOrders] = useState([]);
  const [date,setDate] = useState(today());
  const [products,setProducts] = useState({});
  const [includedProducts,setIncludedProducts] = useState({});
  const [pumpsOut,setPumpsOut] = useState('');
  const [pumpsReturnDate,setPumpsReturnDate] = useState('');
  const [totes,setTotes] = useState('');
  const [markDelivered,setMarkDelivered] = useState(false);
  const [attachments,setAttachments] = useState([]);
  const [showCamera,setShowCamera] = useState(false);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const [recording,setRecording] = useState(false);
  const [cameraMode,setCameraMode] = useState('photo');
  const fileInputRef = useRef(null);

  // Show orders that are not fully delivered
  const deliverableOrders=data.orders.filter(o=>o.status!=='paid'||!isOrderFullyDelivered(o.id));
  const selectedOrderObj=data.orders.find(o=>o.id===selectedOrder);
  const groupsWithPendingOrders=useMemo(()=>data.customerGroups.filter(g=>deliverableOrders.some(o=>g.members.includes(o.customer))),[data.customerGroups,deliverableOrders]);
  const selectedGroupObj=data.customerGroups.find(g=>g.name===selectedGroup);
  const groupPendingOrders=useMemo(()=>selectedGroupObj?deliverableOrders.filter(o=>selectedGroupObj.members.includes(o.customer)):[], [selectedGroupObj,deliverableOrders]);

  // Calculate remaining quantities for the selected order
  const orderRemaining=useMemo(()=>{
    if(!selectedOrderObj) return {};
    const delivered=getOrderDelivered(selectedOrderObj.id);
    const remaining={};
    Object.entries(selectedOrderObj.products).forEach(([pid,qty])=>{
      remaining[pid]=Math.max(0,qty-(delivered[pid]||0));
    });
    return remaining;
  },[selectedOrderObj,getOrderDelivered]);

  const deliveryNum=selectedOrderObj?getOrderDeliveryCount(selectedOrderObj.id)+1:1;

  // When order is selected, default deliver quantities to remaining amounts
  useEffect(()=>{
    if(mode==='individual'&&selectedOrderObj){
      const delivered=getOrderDelivered(selectedOrderObj.id);
      const remaining={};const included={};
      Object.entries(selectedOrderObj.products).forEach(([pid,qty])=>{
        const rem=Math.max(0,qty-(delivered[pid]||0));
        remaining[pid]=rem;
        included[pid]=rem>0;
      });
      setProducts(remaining);
      setIncludedProducts(included);
      // Auto-check "mark delivered" if this delivery covers everything remaining
      setMarkDelivered(Object.values(remaining).every(v=>v<=0)?false:true);
    }
  },[selectedOrder,mode]);
  useEffect(()=>{
    if(mode==='group'&&selectedGroupObj){
      const ids=groupPendingOrders.map(o=>o.id);setSelectedGroupOrders(ids);
      const combined={};const included={};
      groupPendingOrders.forEach(o=>{
        const delivered=getOrderDelivered(o.id);
        Object.entries(o.products).forEach(([pid,qty])=>{
          const rem=Math.max(0,qty-(delivered[pid]||0));
          combined[pid]=(combined[pid]||0)+rem;
          if(rem>0)included[pid]=true;
        });
      });
      setProducts(combined);setIncludedProducts(included);
    }
  },[selectedGroup,mode]);

  const toggleGroupOrder=orderId=>{
    setSelectedGroupOrders(prev=>{
      const next=prev.includes(orderId)?prev.filter(id=>id!==orderId):[...prev,orderId];
      const combined={};const included={};
      groupPendingOrders.filter(o=>next.includes(o.id)).forEach(o=>{
        const delivered=getOrderDelivered(o.id);
        Object.entries(o.products).forEach(([pid,qty])=>{
          const rem=Math.max(0,qty-(delivered[pid]||0));
          combined[pid]=(combined[pid]||0)+rem;
          if(rem>0)included[pid]=true;
        });
      });
      setProducts(combined);setIncludedProducts(included);return next;
    });
  };

  const toggleProduct=(pid)=>setIncludedProducts(prev=>({...prev,[pid]:!prev[pid]}));

  // Camera functions
  const startCamera=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:cameraMode==='video'});
      streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;setShowCamera(true);
    }catch(e){showToast('Camera access denied');setShowCamera(false);}
  };
  const stopCamera=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}setShowCamera(false);setRecording(false);};
  const capturePhoto=()=>{
    const video=videoRef.current;if(!video)return;
    const canvas=document.createElement('canvas');
    const scale=Math.min(1,1200/video.videoWidth);
    canvas.width=video.videoWidth*scale;canvas.height=video.videoHeight*scale;
    canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
    const dataUrl=canvas.toDataURL('image/jpeg',0.8);
    setAttachments(prev=>[...prev,{type:'photo',data:dataUrl,timestamp:new Date().toISOString()}]);
    showToast('Photo captured');
  };
  const startRecording=()=>{
    const stream=streamRef.current;if(!stream)return;
    const chunks=[];const mr=new MediaRecorder(stream,{mimeType:'video/webm'});
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const reader=new FileReader();reader.onload=()=>{setAttachments(prev=>[...prev,{type:'video',data:reader.result,timestamp:new Date().toISOString()}]);showToast('Video saved');};reader.readAsDataURL(blob);};
    mr.start();mediaRecorderRef.current=mr;setRecording(true);
    setTimeout(()=>{if(mediaRecorderRef.current?.state==='recording'){mediaRecorderRef.current.stop();setRecording(false);}},30000);
  };
  const stopRecording=()=>{if(mediaRecorderRef.current?.state==='recording'){mediaRecorderRef.current.stop();setRecording(false);}};
  const handleFileUpload=e=>{
    Array.from(e.target.files).forEach(file=>{const reader=new FileReader();reader.onload=ev=>{
      const type=file.type.startsWith('video')?'video':'photo';
      if(type==='photo'){const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const scale=Math.min(1,1200/img.width);canvas.width=img.width*scale;canvas.height=img.height*scale;canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);setAttachments(prev=>[...prev,{type:'photo',data:canvas.toDataURL('image/jpeg',0.8),timestamp:new Date().toISOString()}]);};img.src=ev.target.result;}
      else setAttachments(prev=>[...prev,{type:'video',data:ev.target.result,timestamp:new Date().toISOString()}]);
    };reader.readAsDataURL(file);});
  };
  const removeAttachment=i=>setAttachments(prev=>prev.filter((_,j)=>j!==i));

  useEffect(()=>()=>stopCamera(),[]);

  const hasSelection=mode==='individual'?!!selectedOrderObj:selectedGroupOrders.length>0;

  const save=()=>{
    // Build delivery products: only included products with qty > 0
    const deliverProducts={};
    Object.entries(products).forEach(([pid,qty])=>{
      if(includedProducts[pid]&&qty>0) deliverProducts[pid]=qty;
    });
    if(Object.keys(deliverProducts).length===0&&!(parseInt(pumpsOut)>0)&&!(parseInt(totes)>0)){alert('No products or equipment selected for delivery');return;}

    if(mode==='individual'){
      if(!selectedOrderObj){alert('Select an order');return;}
      addDelivery({customer:selectedOrderObj.customer,orderId:selectedOrderObj.id,date,products:deliverProducts,deliveryNum,pumpsOut:parseInt(pumpsOut)||0,pumpsReturnDate,pumpsReturned:false,totes:parseInt(totes)||0,totesReturned:false,attachments});
      saveDeliveryTicket({customer:selectedOrderObj.customer,date,products:{...deliverProducts},pumpsOut:parseInt(pumpsOut)||0,totes:parseInt(totes)||0,productCount:Object.keys(deliverProducts).length,deliveryNum,attachments});
      // Determine order status: check if everything is now delivered
      if(markDelivered){
        const prevDelivered=getOrderDelivered(selectedOrderObj.id);
        const allDelivered=Object.entries(selectedOrderObj.products).every(([pid,qty])=>{
          if(qty<=0)return true;
          const totalDel=(prevDelivered[pid]||0)+(deliverProducts[pid]||0);
          return totalDel>=qty;
        });
        updateOrder(selectedOrderObj.id,{status:allDelivered?'paid':'partial-deliver'});
      }
    } else {
      if(selectedGroupOrders.length===0){alert('Select at least one order');return;}
      const ordersToDeliver=groupPendingOrders.filter(o=>selectedGroupOrders.includes(o.id));
      ordersToDeliver.forEach(o=>{
        // Split delivery products proportionally for each order in group
        const orderDeliverProducts={};
        const delivered=getOrderDelivered(o.id);
        Object.entries(o.products).forEach(([pid,qty])=>{
          const rem=Math.max(0,qty-(delivered[pid]||0));
          if(includedProducts[pid]&&rem>0) orderDeliverProducts[pid]=rem;
        });
        addDelivery({customer:o.customer,orderId:o.id,groupName:selectedGroup,date,products:orderDeliverProducts,pumpsOut:0,pumpsReturnDate:'',pumpsReturned:false,totes:0,totesReturned:false,attachments:[]});
        if(markDelivered){
          const allDel=Object.entries(o.products).every(([pid,qty])=>qty<=0||((delivered[pid]||0)+(orderDeliverProducts[pid]||0))>=qty);
          updateOrder(o.id,{status:allDel?'paid':'partial-deliver'});
        }
      });
      saveDeliveryTicket({customer:selectedGroup+' (Group)',date,products:{...deliverProducts},pumpsOut:parseInt(pumpsOut)||0,totes:parseInt(totes)||0,productCount:Object.keys(deliverProducts).length,attachments});
      if((parseInt(pumpsOut)||0)>0||(parseInt(totes)||0)>0){addDelivery({customer:selectedGroup+' (Group)',orderId:'group_'+selectedGroup,groupName:selectedGroup,date,products:{},pumpsOut:parseInt(pumpsOut)||0,pumpsReturnDate,pumpsReturned:false,totes:parseInt(totes)||0,totesReturned:false,attachments});}
      showToast(`${ordersToDeliver.length} deliveries recorded for ${selectedGroup}`);
    }
    onClose();
  };

  return <Modal title="New Delivery" onClose={()=>{stopCamera();onClose();}} wide>
    <div className="modal-body">
      <div style={{display:'flex',gap:0,marginBottom:16,border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',width:'fit-content'}}>
        <button onClick={()=>{setMode('individual');setSelectedGroup('');setSelectedGroupOrders([]);setProducts({});}} style={{padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer',border:'none',background:mode==='individual'?'var(--primary)':'#fff',color:mode==='individual'?'#fff':'var(--text)'}}>Individual Order</button>
        <button onClick={()=>{setMode('group');setSelectedOrder('');setProducts({});}} style={{padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer',border:'none',borderLeft:'1px solid var(--border)',background:mode==='group'?'var(--primary)':'#fff',color:mode==='group'?'#fff':'var(--text)'}}>Group Delivery</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {mode==='individual'?<div className="form-group"><label>Select Order</label><select value={selectedOrder} onChange={e=>setSelectedOrder(e.target.value)}><option value="">-- Select an order --</option>{deliverableOrders.map(o=><option key={o.id} value={o.id}>{o.customer} — {fmtDate(o.date)}</option>)}</select></div>
        :<div className="form-group"><label>Select Group</label><select value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}><option value="">-- Select a group --</option>{groupsWithPendingOrders.map(g=><option key={g.name} value={g.name}>{g.name} ({g.members.length} members)</option>)}</select></div>}
        <div className="form-group"><label>Delivery Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
      </div>
      {mode==='group'&&selectedGroupObj&&<div style={{marginTop:12}}><h4 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Select Orders to Deliver</h4><div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
        {groupPendingOrders.length===0?<div style={{padding:16,textAlign:'center',color:'var(--text-secondary)',fontSize:13}}>No pending orders for this group</div>:groupPendingOrders.map(o=>{const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;return <label key={o.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',background:selectedGroupOrders.includes(o.id)?'var(--primary-bg)':''}}>
          <input type="checkbox" checked={selectedGroupOrders.includes(o.id)} onChange={()=>toggleGroupOrder(o.id)} style={{width:'auto'}}/><span style={{fontWeight:500,flex:1}}>{o.customer}</span><span style={{fontSize:12,color:'var(--text-secondary)'}}>{fmtDate(o.date)}</span><span className="tag">{pc} product{pc!==1?'s':''}</span></label>;})}
      </div></div>}
      {hasSelection&&<>
        {mode==='individual'&&selectedOrderObj&&deliveryNum>1&&<div style={{background:'var(--primary-bg)',border:'1px solid var(--primary-light)',borderRadius:6,padding:'10px 14px',margin:'12px 0',fontSize:13}}>
          <strong>Delivery #{deliveryNum}</strong> for this order. Quantities below show what remains to be delivered.
        </div>}
        <h4 style={{fontSize:14,fontWeight:600,margin:'16px 0 8px'}}>{mode==='group'?'Combined Products':'Products to Deliver'}</h4>
        <table style={{fontSize:13}}><thead><tr><th style={{width:30,padding:'6px 8px'}}></th><th style={{textAlign:'left'}}>Product</th>{mode==='individual'&&<th style={{textAlign:'right',width:70}}>Ordered</th>}{mode==='individual'&&<th style={{textAlign:'right',width:90}}>Previously Delivered</th>}<th style={{textAlign:'right',width:90}}>Remaining</th><th style={{textAlign:'right',width:100}}>Deliver Now</th></tr></thead><tbody>
          {Object.entries(mode==='individual'&&selectedOrderObj?selectedOrderObj.products:products).filter(([,v])=>v>0).map(([pid,orderedQty])=>{
            const p=ALL_PRODUCTS.find(x=>x.id===pid);
            const prevDel=mode==='individual'&&selectedOrderObj?(getOrderDelivered(selectedOrderObj.id)[pid]||0):0;
            const remaining=mode==='individual'?Math.max(0,orderedQty-prevDel):(products[pid]||0);
            const included=includedProducts[pid]||false;
            return <tr key={pid} style={{opacity:included?1:0.4}}>
              <td style={{padding:'6px 8px'}}><input type="checkbox" checked={included} onChange={()=>toggleProduct(pid)} style={{width:'auto'}}/></td>
              <td style={{fontWeight:500}}>{p?.name}</td>
              {mode==='individual'&&<td className="inv-cell">{fmt(orderedQty)}</td>}
              {mode==='individual'&&<td className="inv-cell" style={{color:prevDel>0?'var(--primary)':'var(--text-secondary)'}}>{fmt(prevDel)}</td>}
              <td className="inv-cell" style={{fontWeight:600,color:remaining>0?'var(--warning)':'var(--success)'}}>{fmt(remaining)}</td>
              <td style={{textAlign:'right',padding:'4px 8px'}}><input type="number" step="0.1" min="0" max={remaining} style={{width:80,textAlign:'right'}} disabled={!included} value={included?(products[pid]||0):0} onChange={e=>{const v=Math.min(parseFloat(e.target.value)||0,remaining);setProducts(ps=>({...ps,[pid]:v}));}}/></td>
            </tr>;})}
        </tbody></table>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:16}}>
          <div className="form-group"><label>Pumps Out (qty)</label><input type="number" value={pumpsOut} onChange={e=>setPumpsOut(e.target.value)} placeholder="0"/></div>
          <div className="form-group"><label>Pump Return Date</label><input type="date" value={pumpsReturnDate} onChange={e=>setPumpsReturnDate(e.target.value)}/></div>
          <div className="form-group"><label>Totes (qty)</label><input type="number" value={totes} onChange={e=>setTotes(e.target.value)} placeholder="0"/></div>
        </div>

        {/* ── PHOTO / VIDEO CAPTURE ── */}
        <div style={{marginTop:16,padding:16,background:'#f8fafc',borderRadius:8,border:'1px solid var(--border)'}}>
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Photos & Video</h4>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-secondary" onClick={()=>{setCameraMode('photo');startCamera();}}><Icon name="camera" size={14}/>Take Photo</button>
            <button className="btn btn-secondary" onClick={()=>{setCameraMode('video');startCamera();}}><Icon name="camera" size={14}/>Record Video</button>
            <button className="btn btn-secondary" onClick={()=>fileInputRef.current?.click()}><Icon name="upload" size={14}/>Upload File</button>
            <input ref={fileInputRef} type="file" accept="image/*,video/*" multiple style={{display:'none'}} onChange={handleFileUpload} capture="environment"/>
          </div>
          {showCamera&&<div style={{marginTop:12}}>
            <video ref={videoRef} autoPlay playsInline muted className="camera-preview"/>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              {cameraMode==='photo'?<button className="btn btn-primary" onClick={capturePhoto}><Icon name="camera" size={14}/>Capture</button>:
                recording?<button className="btn btn-danger" onClick={stopRecording}>Stop Recording</button>:<button className="btn btn-danger" onClick={startRecording}>Start Recording (max 30s)</button>}
              <button className="btn btn-secondary" onClick={stopCamera}>Close Camera</button>
            </div>
          </div>}
          {attachments.length>0&&<div className="photo-grid">{attachments.map((a,i)=><div key={i} className="photo-thumb">
            {a.type==='photo'?<img src={a.data}/>:<video src={a.data} controls/>}
            <button className="photo-remove" onClick={()=>removeAttachment(i)}>x</button>
          </div>)}</div>}
        </div>

        <label style={{display:'flex',alignItems:'center',gap:8,marginTop:12,cursor:'pointer',fontSize:13}}>
          <input type="checkbox" checked={markDelivered} onChange={e=>setMarkDelivered(e.target.checked)} style={{width:'auto'}}/>
          Update order status (marks as "Partial Delivery" or "Paid & Delivered" based on quantities)
        </label>
      </>}
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>{stopCamera();onClose();}}>Cancel</button><button className="btn btn-success" onClick={save} disabled={!hasSelection}><Icon name="truck" size={14}/>Record Delivery</button></div>
  </Modal>;
}

// ══════════════════════════
// ── DELIVERY TICKET ──
// ══════════════════════════
function DeliveryTicketModal({delivery,onClose}) {
  const ticketRef=useRef();
  const handlePrint=()=>{
    const content=ticketRef.current.innerHTML;
    const win=window.open('','_blank','width=800,height=600');
    win.document.write(`<!DOCTYPE html><html><head><title>Delivery Ticket - ${delivery.customer}</title><style>body{font-family:'Inter',Arial,sans-serif;padding:40px;color:#1e293b}h2{margin:0 0 4px;font-size:22px}h4{margin:0;font-size:13px;color:#64748b;font-weight:400}table{width:100%;border-collapse:collapse;margin:20px 0}th{text-align:left;padding:10px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-size:12px;font-weight:600;text-transform:uppercase}td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:14px}.sig{margin-top:60px;display:grid;grid-template-columns:1fr 1fr;gap:40px}.sig-line{border-top:1px solid #1e293b;padding-top:8px;font-size:12px;color:#64748b}.photos{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.photos img{max-width:200px;border-radius:4px}@media print{body{padding:20px}}</style></head><body>${content}</body></html>`);
    win.document.close();win.print();
  };
  const productEntries=Object.entries(delivery.products||{}).filter(([,v])=>v>0);
  const atts=delivery.attachments||[];
  return <Modal title="Delivery Ticket" onClose={onClose} wide>
    <div className="modal-body"><div ref={ticketRef}>
      <div style={{textAlign:'center',marginBottom:24,paddingBottom:16,borderBottom:'2px solid #1e293b'}}><h2>Quantum Ag — Delivery Ticket</h2><h4>BWF Product Delivery</h4></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        <p style={{fontSize:14}}><strong>Customer:</strong> {delivery.customer}</p>
        <p style={{fontSize:14}}><strong>Delivery Date:</strong> {fmtDate(delivery.date)}</p>
        {delivery.pumpsOut>0&&<p style={{fontSize:14}}><strong>Pumps Out:</strong> {delivery.pumpsOut}{delivery.pumpsReturnDate?` (return by ${fmtDate(delivery.pumpsReturnDate)})`:''}</p>}
        {delivery.totes>0&&<p style={{fontSize:14}}><strong>Totes:</strong> {delivery.totes}</p>}
      </div>
      {productEntries.length>0&&<table><thead><tr><th>Product</th><th style={{textAlign:'right'}}>Quantity</th></tr></thead><tbody>
        {productEntries.map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <tr key={pid}><td>{p?.name||pid}</td><td style={{textAlign:'right',fontWeight:600}}>{fmt(qty)}</td></tr>;})}
      </tbody></table>}
      {atts.length>0&&<div><h4 style={{fontSize:13,fontWeight:600,margin:'16px 0 8px'}}>Attached Photos/Video</h4><div className="photos" style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {atts.filter(a=>a.type==='photo').map((a,i)=><img key={i} src={a.data} style={{maxWidth:200,borderRadius:4}}/>)}
      </div></div>}
      <div style={{marginTop:60,display:'grid',gridTemplateColumns:'1fr 1fr',gap:40}}>
        <div><div style={{borderTop:'1px solid #1e293b',paddingTop:8,fontSize:12,color:'#64748b'}}>Driver Signature</div></div>
        <div><div style={{borderTop:'1px solid #1e293b',paddingTop:8,fontSize:12,color:'#64748b'}}>Customer Signature</div></div>
      </div>
      <div style={{marginTop:40,paddingTop:16,borderTop:'1px solid #e2e8f0',fontSize:12,color:'#94a3b8',textAlign:'center'}}>Quantum Ag — Generated {new Date().toLocaleDateString()}</div>
    </div></div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Close</button><button className="btn btn-primary" onClick={handlePrint}><Icon name="printer" size={14}/>Print / Save PDF</button></div>
  </Modal>;
}

// ══════════════════════════
// ── SETTINGS SCREEN ──
// ══════════════════════════
function SettingsScreen() {
  const {data,addGroup,updateGroup,deleteGroup,updateSettings,exportData,importData,showToast,setData,sbConnected,archivedYears,availableYears} = useApp();
  const [showGroupModal,setShowGroupModal] = useState(false);
  const [editGroup,setEditGroup] = useState(null);
  const fileRef=useRef();
  const fy=data.settings||{};
  const [fyStartMonth,setFyStartMonth]=useState(fy.fiscalYearStart?.month||1);
  const [fyStartDay,setFyStartDay]=useState(fy.fiscalYearStart?.day||1);
  const [fyEndMonth,setFyEndMonth]=useState(fy.fiscalYearEnd?.month||12);
  const [fyEndDay,setFyEndDay]=useState(fy.fiscalYearEnd?.day||31);
  const [fyLabelMode,setFyLabelMode]=useState(fy.fiscalYearLabel||'end');
  const handleImport=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>importData(ev.target.result);r.readAsText(file);};
  const saveFiscalYear=()=>{updateSettings({fiscalYearStart:{month:parseInt(fyStartMonth),day:parseInt(fyStartDay)},fiscalYearEnd:{month:parseInt(fyEndMonth),day:parseInt(fyEndDay)},fiscalYearLabel:fyLabelMode});showToast('Fiscal year updated');};
  const toggleArchive=year=>{const archived=archivedYears.includes(year)?archivedYears.filter(y=>y!==year):[...archivedYears,year];updateSettings({archivedYears:archived});showToast(archivedYears.includes(year)?'Year unarchived':'Year archived');};

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return <div className="fade-in">
    <div className="page-header"><h2>Settings</h2><p>Manage groups, fiscal year, and data sync</p></div>

    {/* Customer Groups */}
    <div className="card"><div className="card-header"><h3>Customer Groups</h3><button className="btn btn-primary btn-sm" onClick={()=>{setEditGroup(null);setShowGroupModal(true);}}><Icon name="plus" size={14}/>Add Group</button></div>
      <table><thead><tr><th>Group Name</th><th>Members</th><th></th></tr></thead><tbody>
        {data.customerGroups.map((g,i)=><tr key={i}><td style={{fontWeight:600}}>{g.name}</td><td>{g.members.join(', ')}</td><td style={{textAlign:'right'}}>
          <button className="btn-icon" style={{marginRight:4}} onClick={()=>{setEditGroup(i);setShowGroupModal(true);}}><Icon name="edit" size={14}/></button>
          <button className="btn-icon" onClick={()=>{if(confirm('Delete this group?'))deleteGroup(i);}}><Icon name="trash" size={14}/></button></td></tr>)}
      </tbody></table>
    </div>

    {/* Fiscal Year */}
    <div className="card"><div className="card-header"><h3>Fiscal Year Configuration</h3></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Define custom start/end dates for your order year. Orders are categorized into fiscal years based on their order date.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:12,alignItems:'end'}}>
        <div className="form-group"><label>Start Month</label><select value={fyStartMonth} onChange={e=>setFyStartMonth(e.target.value)}>{months.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
        <div className="form-group"><label>Start Day</label><input type="number" min="1" max="31" value={fyStartDay} onChange={e=>setFyStartDay(e.target.value)}/></div>
        <div className="form-group"><label>End Month</label><select value={fyEndMonth} onChange={e=>setFyEndMonth(e.target.value)}>{months.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
        <div className="form-group"><label>End Day</label><input type="number" min="1" max="31" value={fyEndDay} onChange={e=>setFyEndDay(e.target.value)}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:12,alignItems:'end',marginTop:12}}>
        <div className="form-group"><label>Year Label</label><select value={fyLabelMode} onChange={e=>setFyLabelMode(e.target.value)}>
          <option value="end">End Year (e.g. Nov 2025–Oct 2026 → "2026")</option>
          <option value="start">Start Year (e.g. Nov 2025–Oct 2026 → "2025")</option>
          <option value="range">Range (e.g. Nov 2025–Oct 2026 → "2025-2026")</option>
        </select></div>
        <button className="btn btn-primary" onClick={saveFiscalYear}>Save</button>
      </div>
      {fyLabelMode!=='range'&&parseInt(fyStartMonth)!==1&&<p style={{fontSize:12,color:'var(--primary)',marginTop:8,fontStyle:'italic'}}>Preview: A fiscal year starting {months[parseInt(fyStartMonth)-1]} {fyStartDay}, 2025 through {months[parseInt(fyEndMonth)-1]} {fyEndDay}, 2026 will be labeled "<strong>{fyLabelMode==='end'?'2026':'2025'}</strong>"</p>}
    </div>

    {/* Year Archive */}
    <div className="card"><div className="card-header"><h3>Year Archive</h3></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Archive previous years to hide them from the default view. Archived years can still be accessed via the "Show Archived" toggle on the Orders screen.</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {availableYears.map(y=><div key={y} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',border:'1px solid var(--border)',borderRadius:6,background:archivedYears.includes(y)?'#f1f5f9':'#fff'}}>
          <span style={{fontWeight:600,fontSize:14}}>{y}</span>
          <button className="btn btn-sm btn-secondary" onClick={()=>toggleArchive(y)}>{archivedYears.includes(y)?'Unarchive':'Archive'}</button>
        </div>)}
      </div>
    </div>

    {/* Supabase */}
    <div className="card"><div className="card-header"><h3><Icon name="cloud" size={18} style={{marginRight:6}}/>Supabase Multi-User Sync</h3>
      <span className={`sb-status ${sbConnected?'sb-connected':'sb-disconnected'}`}><span className={`status-dot ${sbConnected?'dot-paid':'dot-pending'}`}></span>{sbConnected?'Connected':'Disconnected'}</span></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Real-time multi-user sync is active. All data — orders, inventory, deliveries, and settings — is automatically synced across all logged-in devices.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label>Project</label><input value={SB_URL} disabled style={{background:'#f8fafc',color:'var(--text-secondary)'}}/></div>
        <div className="form-group"><label>Status</label><input value={sbConnected?'Connected & syncing':'Connecting...'} disabled style={{background:sbConnected?'var(--success-bg)':'#f8fafc',color:sbConnected?'var(--success)':'var(--text-secondary)',fontWeight:600}}/></div>
      </div>
    </div>

    {/* Data Management */}
    <div className="card"><div className="card-header"><h3>Data Management</h3></div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={exportData}><Icon name="download" size={16}/>Export Data (JSON)</button>
        <button className="btn btn-secondary" onClick={()=>fileRef.current.click()}><Icon name="upload" size={16}/>Import Data</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
        <button className="btn btn-danger" onClick={()=>{if(confirm('Reset all data to defaults? This cannot be undone.')){setData(INITIAL_DATA);showToast('Data reset');}}}>Reset to Defaults</button>
      </div>
    </div>
    {showGroupModal&&<GroupModal groupIndex={editGroup} onClose={()=>setShowGroupModal(false)}/>}
  </div>;
}

function GroupModal({groupIndex,onClose}) {
  const {data,addGroup,updateGroup}=useApp();
  const existing=groupIndex!==null?data.customerGroups[groupIndex]:null;
  const [name,setName]=useState(existing?.name||'');const [members,setMembers]=useState(existing?.members||[]);const [search,setSearch]=useState('');
  const toggle=c=>setMembers(ms=>ms.includes(c)?ms.filter(m=>m!==c):[...ms,c]);
  const save=()=>{if(!name){alert('Enter group name');return;}if(members.length<2){alert('Add at least 2 members');return;}if(existing)updateGroup(groupIndex,{name,members});else addGroup({name,members});onClose();};
  return <Modal title={existing?'Edit Group':'New Group'} onClose={onClose}>
    <div className="modal-body">
      <div className="form-group"><label>Group Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g., Webster Ag"/></div>
      <div className="form-group"><label>Members</label><input placeholder="Search customers..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:8}}/>
        <div style={{maxHeight:250,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
          {ALL_CUSTOMERS.filter(c=>c.toLowerCase().includes(search.toLowerCase())).map(c=><label key={c} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',cursor:'pointer',fontSize:13,background:members.includes(c)?'var(--primary-bg)':''}}>
            <input type="checkbox" checked={members.includes(c)} onChange={()=>toggle(c)} style={{width:'auto'}}/>{c}</label>)}
        </div></div>
      {members.length>0&&<div style={{marginTop:8}}><span style={{fontSize:12,color:'var(--text-secondary)'}}>Selected: </span>{members.map(m=><span key={m} className="tag" style={{marginRight:4}}>{m}</span>)}</div>}
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Group</button></div>
  </Modal>;
}

// ══════════════════
// ── MAIN APP ──
// ══════════════════
function App() {
  const {toast,activeYear,setActiveYear,visibleYears,sbConnected} = useApp();
  const {user,logout} = useAuth();
  const [page,setPage] = useState('dashboard');
  const [pageArg,setPageArg] = useState(null);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const navigate=(pg,arg)=>{setPage(pg);setPageArg(arg||null);setSidebarOpen(false);};
  const navItems=[{id:'dashboard',label:'Dashboard',icon:'dashboard'},{id:'inventory',label:'Inventory',icon:'inventory'},{id:'orders',label:'Orders',icon:'orders'},{id:'deliveries',label:'Deliveries',icon:'truck'},{id:'customers',label:'Customers',icon:'users'},{id:'settings',label:'Settings',icon:'settings'}];
  const renderPage=()=>{switch(page){case'dashboard':return<Dashboard/>;case'inventory':return<InventoryScreen/>;case'orders':return<OrdersScreen onNavigate={navigate}/>;case'deliveries':return<DeliveriesScreen onNavigate={navigate}/>;case'customers':return<CustomersScreen onNavigate={navigate}/>;case'customer-detail':return<CustomerDetail customerName={pageArg} onBack={()=>navigate('customers')}/>;case'settings':return<SettingsScreen/>;default:return<Dashboard/>;}};
  return <>
    <div className="mobile-header"><button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}><Icon name="menu" size={24}/></button><h1>Quantum Ag</h1><div style={{width:24}}></div></div>
    <div className={`sidebar ${sidebarOpen?'open':''}`}>
      <div className="sidebar-header"><h1>Quantum Ag</h1><p>Inventory & Delivery Tracker</p></div>
      <div className="nav-items">
        {navItems.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>navigate(n.id)}><Icon name={n.icon}/>{n.label}</div>)}
      </div>
      <div className="year-select"><span>Year:</span><select value={activeYear} onChange={e=>setActiveYear(e.target.value)}>{visibleYears.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
      {user && <div style={{padding:'8px 12px',borderTop:'1px solid #1e293b'}}>
        <div style={{fontSize:11,color:'#94a3b8',marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={user.email}>{user.email}</div>
        <button onClick={logout} style={{background:'none',border:'1px solid #334155',borderRadius:4,color:'#94a3b8',fontSize:11,padding:'4px 10px',cursor:'pointer',width:'100%',transition:'all .15s'}} onMouseEnter={e=>{e.target.style.background='#1e293b';e.target.style.color='#e2e8f0'}} onMouseLeave={e=>{e.target.style.background='none';e.target.style.color='#94a3b8'}}>Sign Out</button>
      </div>}
      <div style={{padding:'8px 12px',borderTop:'1px solid #1e293b',fontSize:11,color:'#475569',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>v{APP_VERSION}</span>
        <span className={`sb-status ${sbConnected?'sb-connected':'sb-disconnected'}`} style={{padding:'2px 8px',fontSize:10}}>
          <span className={`status-dot ${sbConnected?'dot-paid':'dot-pending'}`}></span>{sbConnected?'Synced':'Local'}
        </span>
      </div>
    </div>
    <div className="main">{renderPage()}</div>
    {toast&&<div className="toast">{toast}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate><AppProvider><App/></AppProvider></AuthGate>);
</script>
</body>
</html>
