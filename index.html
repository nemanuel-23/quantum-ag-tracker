body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.nav-items{flex:1;padding:8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;cursor:pointer;font-size:14px;color:#94a3b8;transition:all .15s;margin-bottom:2px}

.nav-item.active{background:var(--primary);color:#fff}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{margin-left:var(--sidebar-w);padding:24px;min-height:100vh}
.page-header{margin-bottom:24px}
.page-header h2{font-size:24px;font-weight:700;color:var(--text)}
.page-header p{font-size:14px;color:var(--text-secondary);margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.card-header h3{font-size:16px;font-weight:600}

.kpi-card.active{border-color:var(--primary);box-shadow:0 4px 16px rgba(30,64,175,.15)}

.kpi-card:hover .kpi-arrow{opacity:.7}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);margin-bottom:6px}
.kpi-value{font-size:30px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}

.btn-secondary{background:#fff;border-color:var(--border);color:var(--text)}.btn-secondary:hover{background:#f1f5f9}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center}

table{width:100%;border-collapse:collapse;font-size:13px}

.status-paid{background:var(--success-bg);color:var(--success)}

function getFiscalYear(dateStr, fyStart) {
  if(!dateStr) return 'Undated';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return 'Undated';
  const year = d.getFullYear();
  const month = d.getMonth()+1;
  const day = d.getDate();
  const sm = fyStart?.month||1; const sd = fyStart?.day||1;
  if(sm===1&&sd===1) return String(year);
  if(month>sm||(month===sm&&day>=sd)) return year+'-'+(year+1);
  return (year-1)+'-'+year;
}
function getAvailableYears(orders, fyStart) {
  const years = new Set();
  orders.forEach(o=>years.add(getFiscalYear(o.date,fyStart)));
  if(years.size===0) years.add(getFiscalYear(today(),fyStart));
  return [...years].sort().reverse();
}

// ── SUPABASE LAYER ──
let supabaseClient = null;
function initSupabase(url, key) {
  if(url && key && window.supabase) {
    supabaseClient = window.supabase.createClient(url, key);
    return supabaseClient;
  }
  return null;
}

// ── CONTEXT ──
const AppContext = createContext();
function useApp(){return useContext(AppContext);}

function AppProvider({children}) {
  const [data, setData] = useState(() => {
    const sv = localStorage.getItem('quantumag_version');
    const saved = localStorage.getItem('quantumag_data');
    if(sv!==APP_VERSION||!saved){localStorage.setItem('quantumag_version',APP_VERSION);return INITIAL_DATA;}
    const parsed = JSON.parse(saved);
    if(!parsed.settings) parsed.settings = INITIAL_DATA.settings;
    if(!parsed.deliveryTickets) parsed.deliveryTickets = [];
    return parsed;
  });
  const [toast,setToast] = useState(null);
  const [sbConnected,setSbConnected] = useState(false);
  const [activeYear,setActiveYear] = useState(()=>getFiscalYear(today(),data.settings?.fiscalYearStart));

  useEffect(()=>{localStorage.setItem('quantumag_data',JSON.stringify(data));localStorage.setItem('quantumag_version',APP_VERSION);},[data]);

  // Supabase sync
  useEffect(()=>{
    const sb = data.settings?.supabase;
    if(sb?.enabled&&sb?.url&&sb?.anonKey){
      const client = initSupabase(sb.url,sb.anonKey);
      if(client){
        client.from('app_data').select('*').limit(1).then(({data:rows,error})=>{
          if(!error){setSbConnected(true);showToast('Connected to Supabase');}
          else{setSbConnected(false);}
        });
        const channel = client.channel('realtime_sync').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},(payload)=>{
          if(payload.new?.data){setData(d=>({...d,...JSON.parse(payload.new.data),settings:d.settings}));}
        }).subscribe();
        return ()=>{client.removeChannel(channel);};
      }
    } else {setSbConnected(false);}
  },[data.settings?.supabase?.enabled,data.settings?.supabase?.url]);

  const syncToSupabase = useCallback((newData)=>{
    if(sbConnected&&supabaseClient){
      const {settings,...syncData} = newData;
      supabaseClient.from('app_data').upsert({id:1,data:JSON.stringify(syncData),updated_at:new Date().toISOString()});
    }
  },[sbConnected]);

  const showToast = msg =>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  const updateData = (updater)=>{
    setData(d=>{const n=typeof updater==='function'?updater(d):updater;syncToSupabase(n);return n;});
  };

  const updateInventory=(pid,field,val)=>{updateData(d=>({...d,inventory:{...d.inventory,[pid]:{...d.inventory[pid]||{starting:0,additions:[]},[field]:val}}}));};
  const addInventory=(pid,add)=>{updateData(d=>{const inv=d.inventory[pid]||{starting:0,additions:[]};return{...d,inventory:{...d.inventory,[pid]:{...inv,additions:[...inv.additions,add]}}};});};
  const addOrder=o=>{updateData(d=>({...d,orders:[...d.orders,{...o,id:uid()}]}));showToast('Order added');};
  const updateOrder=(id,u)=>{updateData(d=>({...d,orders:d.orders.map(o=>o.id===id?{...o,...u}:o)}));};
  const deleteOrder=id=>{updateData(d=>({...d,orders:d.orders.filter(o=>o.id!==id)}));showToast('Order deleted');};
  const addDelivery=del=>{updateData(d=>({...d,deliveries:[...d.deliveries,{...del,id:uid()}]}));showToast('Delivery recorded');};
  const updateDelivery=(id,u)=>{updateData(d=>({...d,deliveries:d.deliveries.map(dl=>dl.id===id?{...dl,...u}:dl)}));};
  const addGroup=g=>{updateData(d=>({...d,customerGroups:[...d.customerGroups,g]}));};
  const updateGroup=(i,g)=>{updateData(d=>({...d,customerGroups:d.customerGroups.map((x,j)=>j===i?g:x)}));};
  const deleteGroup=i=>{updateData(d=>({...d,customerGroups:d.customerGroups.filter((_,j)=>j!==i)}));};
  const updateSettings=s=>{setData(d=>({...d,settings:{...d.settings,...s}}));};
  const saveDeliveryTicket=t=>{updateData(d=>({...d,deliveryTickets:[...d.deliveryTickets,{...t,id:uid(),savedAt:today()}]}));};

  const fyStart = data.settings?.fiscalYearStart||{month:1,day:1};
  const availableYears = useMemo(()=>getAvailableYears(data.orders,fyStart),[data.orders,fyStart]);
  const archivedYears = data.settings?.archivedYears||[];
  const visibleYears = availableYears.filter(y=>!archivedYears.includes(y));

  const yearOrders = useMemo(()=>{
    return data.orders.filter(o=>getFiscalYear(o.date,fyStart)===activeYear);
  },[data.orders,activeYear,fyStart]);

  const activeProducts = useMemo(()=>{
    const used = new Set();
    Object.keys(data.inventory).forEach(pid=>{const inv=data.inventory[pid];if(inv.starting>0||inv.additions.length>0)used.add(pid);});
    data.orders.forEach(o=>Object.keys(o.products).forEach(pid=>{if(o.products[pid]>0)used.add(pid);}));
    return ALL_PRODUCTS.filter(p=>used.has(p.id));
  },[data]);

  const activeCustomers = useMemo(()=>{
    const used=new Set(data.orders.map(o=>o.customer));
    return ALL_CUSTOMERS.filter(c=>used.has(c));
  },[data]);

  const getProductTotalSold=useCallback(pid=>data.orders.reduce((s,o)=>s+(o.products[pid]||0),0),[data.orders]);
  const getProductDelivered=useCallback(pid=>data.deliveries.reduce((s,d)=>s+(d.products?.[pid]||0),0),[data.deliveries]);
  const getProductAvailable=useCallback(pid=>{const inv=data.inventory[pid]||{starting:0,additions:[]};const added=inv.additions.reduce((s,a)=>s+a.qty,0);return inv.starting+added-getProductTotalSold(pid);},[data.inventory,getProductTotalSold]);
  const getProductSoldNotDelivered=useCallback(pid=>getProductTotalSold(pid)-getProductDelivered(pid),[getProductTotalSold,getProductDelivered]);

  const exportData=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='quantum-ag-backup-'+today()+'.json';a.click();URL.revokeObjectURL(u);showToast('Exported');};
  const importData=json=>{try{setData(JSON.parse(json));showToast('Imported');}catch(e){showToast('Invalid file');}};

  return <AppContext.Provider value={{data,setData:updateData,activeProducts,activeCustomers,updateInventory,addInventory,addOrder,updateOrder,deleteOrder,addDelivery,updateDelivery,addGroup,updateGroup,deleteGroup,updateSettings,saveDeliveryTicket,getProductTotalSold,getProductDelivered,getProductAvailable,getProductSoldNotDelivered,exportData,importData,showToast,toast,sbConnected,activeYear,setActiveYear,availableYears,visibleYears,archivedYears,yearOrders,fyStart}}>{children}</AppContext.Provider>;
}

// ── MODAL ──
function Modal({title,onClose,children,wide}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal" style={wide?{maxWidth:800}:{}} onClick={e=>e.stopPropagation()}>
    <div className="modal-header"><h3>{title}</h3><button className="btn-icon" onClick={onClose}><Icon name="x"/></button></div>{children}
  </div></div>;
}

    {key:'needed',label:'Products Needed',value:productsNeeded.length,color:'var(--danger)',sub:'Negative inventory — need to order',icon:'alert'},

    {key:'ready',label:'Orders to Deliver',value:ordersReady.length,color:'var(--warning)',sub:'Not yet marked delivered',icon:'truck'},
    {key:'delivered',label:'Orders Delivered',value:ordersDelivered.length,color:'var(--success)',sub:activeYear+' completed',icon:'check'},

          <div key={k.key} className={`kpi-card ${drillDown===k.key?'active':''}`} onClick={()=>toggle(k.key)}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value" style={{color:k.color}}>{k.value}</div>

      {/* ── DRILL-DOWN: Products Needed ── */}
      {drillDown==='needed' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>Products Needed — Negative Inventory</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>

              <thead><tr><th>Product</th><th style={{textAlign:'right'}}>Available</th><th style={{textAlign:'right'}}>Deficit</th><th style={{textAlign:'right'}}>Total Sold</th><th></th></tr></thead>

                  const orders=ordersForProduct(p.id);
                  const isExpanded=expandedProduct===p.id;
                  return <React.Fragment key={p.id}>
                    <tr className="expand-row" onClick={()=>setExpandedProduct(isExpanded?null:p.id)}>
                      <td style={{fontWeight:500}}><Icon name={isExpanded?'down':'chevron'} size={14} style={{marginRight:6}}/>{p.name}</td>
                      <td className="inv-cell negative">{fmt(avail)}</td>
                      <td className="inv-cell negative">{fmt(Math.abs(avail))} needed</td>
                      <td className="inv-cell">{fmt(getProductTotalSold(p.id))}</td>

                    </tr>
                    {isExpanded && (
                      <tr><td colSpan="5" style={{padding:'4px 12px 12px'}}>

function InventoryScreen() {
  const {data,activeProducts,updateInventory,addInventory,getProductTotalSold,getProductAvailable,getProductSoldNotDelivered,getProductDelivered,showToast} = useApp();
  const [addModal,setAddModal] = useState(null);
  const [addDate,setAddDate] = useState(today());
  const [addQty,setAddQty] = useState('');
  const [addNote,setAddNote] = useState('');
  const [editModal,setEditModal] = useState(null);
  const [editVal,setEditVal] = useState('');

  const handleAdd=()=>{if(!addQty||isNaN(addQty))return;addInventory(addModal,{date:addDate,qty:parseFloat(addQty),note:addNote});setAddModal(null);setAddQty('');setAddNote('');showToast('Inventory added');};

  return (
    <div className="fade-in">
      <div className="page-header"><h2>Inventory Management</h2><p>Track starting, added, and available inventory by product</p></div>
      <div className="card"><div className="inv-table-wrap"><table>
        <thead><tr><th>Product</th><th style={{textAlign:'right'}}>Starting</th><th style={{textAlign:'right'}}>Added</th><th style={{textAlign:'right'}}>Total Sold</th><th style={{textAlign:'right'}}>Delivered</th><th style={{textAlign:'right'}}>Sold, Not Delivered</th><th style={{textAlign:'right'}}>Available</th><th></th></tr></thead>
        <tbody>{activeProducts.map(p=>{
          const inv=data.inventory[p.id]||{starting:0,additions:[]};const added=inv.additions.reduce((s,a)=>s+a.qty,0);const sold=getProductTotalSold(p.id);const delivered=getProductDelivered(p.id);const snd=getProductSoldNotDelivered(p.id);const avail=getProductAvailable(p.id);
          return <tr key={p.id}>
            <td style={{fontWeight:500}}>{p.name}</td>
            <td className="inv-cell" style={{cursor:'pointer',textDecoration:'underline dotted'}} onClick={()=>{setEditModal(p.id);setEditVal(inv.starting);}}>{fmt(inv.starting)}</td>
            <td className="inv-cell positive">{added>0?'+'+fmt(added):'—'}{inv.additions.length>0&&<div style={{fontSize:10,color:'#94a3b8'}}>{inv.additions.length} addition{inv.additions.length>1?'s':''}</div>}</td>
            <td className="inv-cell">{fmt(sold)}</td>
            <td className="inv-cell" style={{color:'var(--success)'}}>{fmt(delivered)}</td>
            <td className="inv-cell" style={{color:snd>0?'var(--warning)':'inherit',fontWeight:snd>0?600:400}}>{fmt(Math.max(0,snd))}</td>
            <td className={`inv-cell ${avail<0?'negative':'positive'}`} style={{fontWeight:700}}>{fmt(avail)}</td>
            <td><button className="btn btn-sm btn-secondary" onClick={()=>setAddModal(p.id)}><Icon name="plus" size={14}/>Add</button></td>
          </tr>;
        })}</tbody>
      </table></div></div>
      {addModal&&<Modal title={`Add Inventory — ${ALL_PRODUCTS.find(p=>p.id===addModal)?.name}`} onClose={()=>setAddModal(null)}>
        <div className="modal-body">
          <div className="form-group"><label>Date</label><input type="date" value={addDate} onChange={e=>setAddDate(e.target.value)}/></div>
          <div className="form-group"><label>Quantity</label><input type="number" step="0.1" placeholder="Enter quantity" value={addQty} onChange={e=>setAddQty(e.target.value)}/></div>
          <div className="form-group"><label>Note (optional)</label><input placeholder="e.g., Restock from supplier" value={addNote} onChange={e=>setAddNote(e.target.value)}/></div>
          {(data.inventory[addModal]?.additions||[]).length>0&&<div style={{marginTop:16}}><h4 style={{fontSize:13,fontWeight:600,marginBottom:8}}>Addition History</h4><table><thead><tr><th>Date</th><th>Qty</th><th>Note</th></tr></thead><tbody>{(data.inventory[addModal]?.additions||[]).map((a,i)=><tr key={i}><td>{fmtDate(a.date)}</td><td>{fmt(a.qty)}</td><td>{a.note||'—'}</td></tr>)}</tbody></table></div>}
        </div>
        <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setAddModal(null)}>Cancel</button><button className="btn btn-primary" onClick={handleAdd}>Add Inventory</button></div>
      </Modal>}
      {editModal&&<Modal title={`Edit Starting Inventory — ${ALL_PRODUCTS.find(p=>p.id===editModal)?.name}`} onClose={()=>setEditModal(null)}>
        <div className="modal-body"><div className="form-group"><label>Starting Inventory</label><input type="number" step="0.1" value={editVal} onChange={e=>setEditVal(e.target.value)}/></div></div>
        <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setEditModal(null)}>Cancel</button><button className="btn btn-primary" onClick={()=>{updateInventory(editModal,'starting',parseFloat(editVal)||0);setEditModal(null);showToast('Updated');}}>Save</button></div>
      </Modal>}
    </div>
  );
}

function OrdersScreen({onNavigate}) {

        <div style={{display:'flex',gap:8,alignItems:'center'}}>

          </select>

          <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Icon name="plus" size={16}/>New Order</button>
        </div>
      </div>
      <div className="card" style={{padding:'12px 16px',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        <div className="search-box" style={{flex:1,minWidth:200}}><Icon name="search"/><input placeholder="Search customers..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <div className="chip-select">
          <span className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>All</span>

        </div>
      </div>
      <div className="card" style={{padding:0}}><div className="inv-table-wrap"><table>
        <thead><tr><th>Customer</th><th>Order Date</th><th>Products</th><th>Status</th><th>Invoiced</th><th></th></tr></thead>
        <tbody>{filtered.length===0?<tr><td colSpan="6" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No orders found</td></tr>:filtered.map(o=>{
          const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;
          return <tr key={o.id} style={{cursor:'pointer'}} onClick={()=>setEditOrder(o)}>
            <td style={{fontWeight:500}}>{o.customer}</td><td>{fmtDate(o.date)}</td><td><span className="tag">{pc} product{pc!==1?'s':''}</span></td>
            <td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td>
            <td>{o.invoiced?<span style={{color:'var(--success)'}}>Yes</span>:'No'}</td>
            <td style={{textAlign:'right'}}><button className="btn-icon" style={{marginRight:4}} onClick={e=>{e.stopPropagation();setEditOrder(o);}}><Icon name="edit" size={14}/></button><button className="btn-icon" onClick={e=>{e.stopPropagation();if(confirm('Delete?'))deleteOrder(o.id);}}><Icon name="trash" size={14}/></button></td>

function OrderModal({order,onClose}) {
  const {addOrder,updateOrder,showToast} = useApp();
  const [customer,setCustomer] = useState(order?.customer||'');
  const [date,setDate] = useState(order?.date||today());
  const [status,setStatus] = useState(order?.status||'pending');
  const [invoiced,setInvoiced] = useState(order?.invoiced||false);
  const [products,setProducts] = useState(order?.products||{});
  const [custSearch,setCustSearch] = useState('');
  const filteredCust=ALL_CUSTOMERS.filter(c=>c.toLowerCase().includes(custSearch.toLowerCase()));
  const setProduct=(pid,val)=>{const v=parseFloat(val)||0;setProducts(p=>v>0?{...p,[pid]:v}:Object.fromEntries(Object.entries(p).filter(([k])=>k!==pid)));};
  const save=()=>{if(!customer){alert('Select a customer');return;}if(Object.keys(products).length===0){alert('Add at least one product');return;}if(order){updateOrder(order.id,{customer,date,status,invoiced,products});showToast('Order updated');}else addOrder({customer,date,status,invoiced,products});onClose();};
  return <Modal title={order?'Edit Order':'New Order'} onClose={onClose} wide>
    <div className="modal-body">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label>Customer</label>{order?<input value={customer} readOnly style={{background:'#f8fafc'}}/>:<div><input placeholder="Search customer..." value={custSearch} onChange={e=>{setCustSearch(e.target.value);if(!customer)setCustomer('');}}/>
          {custSearch&&!customer&&<div style={{border:'1px solid var(--border)',borderRadius:6,maxHeight:150,overflowY:'auto',marginTop:4}}>{filteredCust.slice(0,10).map(c=><div key={c} style={{padding:'6px 12px',cursor:'pointer',fontSize:13}} onClick={()=>{setCustomer(c);setCustSearch(c);}} onMouseEnter={e=>e.target.style.background='#f1f5f9'} onMouseLeave={e=>e.target.style.background=''}>{c}</div>)}</div>}
        </div>}</div>
        <div className="form-group"><label>Order Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="form-group"><label>Status</label><select value={status} onChange={e=>setStatus(e.target.value)}>{STATUS_OPTIONS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select></div>
        <div className="form-group" style={{display:'flex',alignItems:'flex-end',paddingBottom:8}}><label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}><input type="checkbox" checked={invoiced} onChange={e=>setInvoiced(e.target.checked)} style={{width:'auto'}}/>Invoiced</label></div>
      </div>
      <h4 style={{fontSize:14,fontWeight:600,margin:'16px 0 8px'}}>Products & Quantities</h4>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
        {ALL_PRODUCTS.map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span><input type="number" step="0.1" style={{width:80}} placeholder="0" value={products[p.id]||''} onChange={e=>setProduct(p.id,e.target.value)}/></div>)}
      </div>
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={save}>{order?'Save Changes':'Create Order'}</button></div>
  </Modal>;
}

function CustomersScreen({onNavigate}) {
  const {data,activeCustomers} = useApp();

    const group=data.customerGroups.find(g=>g.members.includes(name));return{name,orders,totalProducts:tp,group:group?.name||null};
  }).filter(c=>c.name.toLowerCase().includes(search.toLowerCase())),[activeCustomers,data,search]);

  const groupData=useMemo(()=>data.customerGroups.map(g=>{

    return{...g,members,totalProducts:tp};
  }),[data.customerGroups,customerData]);

  return <div className="fade-in">

      <table><thead><tr><th>Customer</th><th>Orders</th><th>Latest Date</th><th>Status</th><th></th></tr></thead><tbody>
        {g.members.map(m=>{const latest=m.orders.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0];const st=latest?getStatus(latest.status):getStatus('pending');return <tr key={m.name} style={{cursor:'pointer'}} onClick={()=>onNavigate('customer-detail',m.name)}><td style={{fontWeight:500}}>{m.name}</td><td>{m.orders.length}</td><td>{latest?fmtDate(latest.date):'—'}</td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td><td style={{textAlign:'right'}}><Icon name="chevron" size={16}/></td></tr>;})}
        <tr className="group-row"><td>{g.name} Total</td><td>{g.members.reduce((s,m)=>s+m.orders.length,0)}</td><td colSpan="3">{Object.entries(g.totalProducts).filter(([,v])=>v>0).slice(0,5).map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <span key={pid} className="tag" style={{marginRight:4}}>{p?.name}: {fmt(qty)}</span>;})}</td></tr>
      </tbody></table>
    </div>)}
    <div className="card"><div className="card-header"><h3>All Customers</h3></div><table><thead><tr><th>Customer</th><th>Group</th><th>Orders</th><th>Latest</th><th>Status</th><th></th></tr></thead><tbody>
      {customerData.map(c=>{const latest=c.orders.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0];const st=latest?getStatus(latest.status):getStatus('pending');return <tr key={c.name} style={{cursor:'pointer'}} onClick={()=>onNavigate('customer-detail',c.name)}><td style={{fontWeight:500}}>{c.name}</td><td>{c.group?<span className="tag" style={{background:'var(--primary-bg)',color:'var(--primary)'}}>{c.group}</span>:'—'}</td><td>{c.orders.length}</td><td>{latest?fmtDate(latest.date):'—'}</td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td><td style={{textAlign:'right'}}><Icon name="chevron" size={16}/></td></tr>;})}
    </tbody></table></div>
  </div>;
}

    </tbody></table></div>}
    {tab==='pumps'&&<div className="card" style={{padding:0}}><table><thead><tr><th>Customer</th><th>Delivery Date</th><th>Pumps Out</th><th>Return Date</th><th></th></tr></thead><tbody>
      {activePumps.length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No pumps currently out</td></tr>:activePumps.map(d=><tr key={d.id}><td style={{fontWeight:500}}>{d.customer}</td><td>{fmtDate(d.date)}</td><td style={{fontWeight:600}}>{d.pumpsOut}</td><td>{d.pumpsReturnDate?fmtDate(d.pumpsReturnDate):'Not set'}</td>
        <td><button className="btn btn-sm btn-success" onClick={()=>{updateDelivery(d.id,{pumpsReturned:true,pumpsReturnedDate:today()});showToast('Pumps returned');}}><Icon name="check" size={14}/>Return</button></td></tr>)}
    </tbody></table></div>}
    {tab==='totes'&&<div className="card" style={{padding:0}}><table><thead><tr><th>Customer</th><th>Delivery Date</th><th>Totes</th><th>Status</th><th></th></tr></thead><tbody>
      {activeTotes.length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No totes currently out</td></tr>:activeTotes.map(d=><tr key={d.id}><td style={{fontWeight:500}}>{d.customer}</td><td>{fmtDate(d.date)}</td><td style={{fontWeight:600}}>{d.totes}</td><td><span className="status-badge status-partial-deliver"><span className="status-dot dot-partial-deliver"></span>Out</span></td>
        <td><button className="btn btn-sm btn-success" onClick={()=>{updateDelivery(d.id,{totesReturned:true,totesReturnedDate:today()});showToast('Totes checked in');}}><Icon name="check" size={14}/>Check In</button></td></tr>)}
    </tbody></table></div>}
    {tab==='tickets'&&<div className="card" style={{padding:0}}><table><thead><tr><th>Customer</th><th>Delivery Date</th><th>Saved On</th><th>Products</th><th></th></tr></thead><tbody>
      {(data.deliveryTickets||[]).length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No saved tickets yet. Tickets are saved when you generate a delivery.</td></tr>:data.deliveryTickets.map(t=><tr key={t.id}><td style={{fontWeight:500}}>{t.customer}</td><td>{fmtDate(t.date)}</td><td>{fmtDate(t.savedAt)}</td><td>{t.productCount} products</td>
        <td><button className="btn btn-sm btn-secondary" onClick={()=>setShowTicket(t)}><Icon name="printer" size={14}/>View</button></td></tr>)}
    </tbody></table></div>}
    {showNew&&<NewDeliveryModal onClose={()=>setShowNew(false)}/>}
    {showTicket&&<DeliveryTicketModal delivery={showTicket} onClose={()=>setShowTicket(null)}/>}
  </div>;
}

// ══════════════════════════════════════
// ── NEW DELIVERY WITH PHOTO CAPTURE ──
// ══════════════════════════════════════
function NewDeliveryModal({onClose}) {
  const {data,addDelivery,updateOrder,showToast,saveDeliveryTicket} = useApp();
  const [mode,setMode] = useState('individual');
  const [selectedOrder,setSelectedOrder] = useState('');
  const [selectedGroup,setSelectedGroup] = useState('');
  const [selectedGroupOrders,setSelectedGroupOrders] = useState([]);
  const [date,setDate] = useState(today());
  const [products,setProducts] = useState({});
  const [pumpsOut,setPumpsOut] = useState('');
  const [pumpsReturnDate,setPumpsReturnDate] = useState('');
  const [totes,setTotes] = useState('');
  const [markDelivered,setMarkDelivered] = useState(true);
  const [attachments,setAttachments] = useState([]);
  const [showCamera,setShowCamera] = useState(false);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const [recording,setRecording] = useState(false);
  const [cameraMode,setCameraMode] = useState('photo');
  const fileInputRef = useRef(null);

  const pendingOrders=data.orders.filter(o=>o.status!=='paid');
  const selectedOrderObj=data.orders.find(o=>o.id===selectedOrder);
  const groupsWithPendingOrders=useMemo(()=>data.customerGroups.filter(g=>pendingOrders.some(o=>g.members.includes(o.customer))),[data.customerGroups,pendingOrders]);
  const selectedGroupObj=data.customerGroups.find(g=>g.name===selectedGroup);
  const groupPendingOrders=useMemo(()=>selectedGroupObj?pendingOrders.filter(o=>selectedGroupObj.members.includes(o.customer)):[], [selectedGroupObj,pendingOrders]);

  useEffect(()=>{if(mode==='individual'&&selectedOrderObj)setProducts({...selectedOrderObj.products});},[selectedOrder,mode]);
  useEffect(()=>{
    if(mode==='group'&&selectedGroupObj){
      const ids=groupPendingOrders.map(o=>o.id);setSelectedGroupOrders(ids);
      const combined={};groupPendingOrders.forEach(o=>{Object.entries(o.products).forEach(([pid,qty])=>{combined[pid]=(combined[pid]||0)+qty;});});setProducts(combined);
    }
  },[selectedGroup,mode]);

  const toggleGroupOrder=orderId=>{
    setSelectedGroupOrders(prev=>{
      const next=prev.includes(orderId)?prev.filter(id=>id!==orderId):[...prev,orderId];
      const combined={};groupPendingOrders.filter(o=>next.includes(o.id)).forEach(o=>{Object.entries(o.products).forEach(([pid,qty])=>{combined[pid]=(combined[pid]||0)+qty;});});setProducts(combined);return next;
    });
  };

  // Camera functions
  const startCamera=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:cameraMode==='video'});
      streamRef.current=stream;if(videoRef.current)videoRef.current.srcObject=stream;setShowCamera(true);
    }catch(e){showToast('Camera access denied');setShowCamera(false);}
  };
  const stopCamera=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}setShowCamera(false);setRecording(false);};
  const capturePhoto=()=>{
    const video=videoRef.current;if(!video)return;
    const canvas=document.createElement('canvas');
    const scale=Math.min(1,1200/video.videoWidth);
    canvas.width=video.videoWidth*scale;canvas.height=video.videoHeight*scale;
    canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
    const dataUrl=canvas.toDataURL('image/jpeg',0.8);
    setAttachments(prev=>[...prev,{type:'photo',data:dataUrl,timestamp:new Date().toISOString()}]);
    showToast('Photo captured');
  };
  const startRecording=()=>{
    const stream=streamRef.current;if(!stream)return;
    const chunks=[];const mr=new MediaRecorder(stream,{mimeType:'video/webm'});
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
    mr.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});const reader=new FileReader();reader.onload=()=>{setAttachments(prev=>[...prev,{type:'video',data:reader.result,timestamp:new Date().toISOString()}]);showToast('Video saved');};reader.readAsDataURL(blob);};
    mr.start();mediaRecorderRef.current=mr;setRecording(true);
    setTimeout(()=>{if(mediaRecorderRef.current?.state==='recording'){mediaRecorderRef.current.stop();setRecording(false);}},30000);
  };
  const stopRecording=()=>{if(mediaRecorderRef.current?.state==='recording'){mediaRecorderRef.current.stop();setRecording(false);}};
  const handleFileUpload=e=>{
    Array.from(e.target.files).forEach(file=>{const reader=new FileReader();reader.onload=ev=>{
      const type=file.type.startsWith('video')?'video':'photo';
      if(type==='photo'){const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');const scale=Math.min(1,1200/img.width);canvas.width=img.width*scale;canvas.height=img.height*scale;canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);setAttachments(prev=>[...prev,{type:'photo',data:canvas.toDataURL('image/jpeg',0.8),timestamp:new Date().toISOString()}]);};img.src=ev.target.result;}
      else setAttachments(prev=>[...prev,{type:'video',data:ev.target.result,timestamp:new Date().toISOString()}]);
    };reader.readAsDataURL(file);});
  };
  const removeAttachment=i=>setAttachments(prev=>prev.filter((_,j)=>j!==i));

  useEffect(()=>()=>stopCamera(),[]);

  const hasSelection=mode==='individual'?!!selectedOrderObj:selectedGroupOrders.length>0;

  const save=()=>{
    if(mode==='individual'){
      if(!selectedOrderObj){alert('Select an order');return;}
      addDelivery({customer:selectedOrderObj.customer,orderId:selectedOrderObj.id,date,products,pumpsOut:parseInt(pumpsOut)||0,pumpsReturnDate,pumpsReturned:false,totes:parseInt(totes)||0,totesReturned:false,attachments});
      saveDeliveryTicket({customer:selectedOrderObj.customer,date,products:{...products},pumpsOut:parseInt(pumpsOut)||0,totes:parseInt(totes)||0,productCount:Object.keys(products).filter(k=>products[k]>0).length,attachments});
      if(markDelivered)updateOrder(selectedOrderObj.id,{status:'paid'});
    } else {
      if(selectedGroupOrders.length===0){alert('Select at least one order');return;}
      const ordersToDeliver=groupPendingOrders.filter(o=>selectedGroupOrders.includes(o.id));
      ordersToDeliver.forEach(o=>{
        addDelivery({customer:o.customer,orderId:o.id,groupName:selectedGroup,date,products:{...o.products},pumpsOut:0,pumpsReturnDate:'',pumpsReturned:false,totes:0,totesReturned:false,attachments:[]});
        if(markDelivered)updateOrder(o.id,{status:'paid'});
      });
      saveDeliveryTicket({customer:selectedGroup+' (Group)',date,products:{...products},pumpsOut:parseInt(pumpsOut)||0,totes:parseInt(totes)||0,productCount:Object.keys(products).filter(k=>products[k]>0).length,attachments});
      if((parseInt(pumpsOut)||0)>0||(parseInt(totes)||0)>0){addDelivery({customer:selectedGroup+' (Group)',orderId:'group_'+selectedGroup,groupName:selectedGroup,date,products:{},pumpsOut:parseInt(pumpsOut)||0,pumpsReturnDate,pumpsReturned:false,totes:parseInt(totes)||0,totesReturned:false,attachments});}
      showToast(`${ordersToDeliver.length} deliveries recorded for ${selectedGroup}`);
    }
    onClose();
  };

  return <Modal title="New Delivery" onClose={()=>{stopCamera();onClose();}} wide>
    <div className="modal-body">
      <div style={{display:'flex',gap:0,marginBottom:16,border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',width:'fit-content'}}>
        <button onClick={()=>{setMode('individual');setSelectedGroup('');setSelectedGroupOrders([]);setProducts({});}} style={{padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer',border:'none',background:mode==='individual'?'var(--primary)':'#fff',color:mode==='individual'?'#fff':'var(--text)'}}>Individual Order</button>
        <button onClick={()=>{setMode('group');setSelectedOrder('');setProducts({});}} style={{padding:'8px 20px',fontSize:13,fontWeight:500,cursor:'pointer',border:'none',borderLeft:'1px solid var(--border)',background:mode==='group'?'var(--primary)':'#fff',color:mode==='group'?'#fff':'var(--text)'}}>Group Delivery</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        {mode==='individual'?<div className="form-group"><label>Select Order</label><select value={selectedOrder} onChange={e=>setSelectedOrder(e.target.value)}><option value="">-- Select an order --</option>{pendingOrders.map(o=><option key={o.id} value={o.id}>{o.customer} — {fmtDate(o.date)}</option>)}</select></div>
        :<div className="form-group"><label>Select Group</label><select value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}><option value="">-- Select a group --</option>{groupsWithPendingOrders.map(g=><option key={g.name} value={g.name}>{g.name} ({g.members.length} members)</option>)}</select></div>}
        <div className="form-group"><label>Delivery Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
      </div>
      {mode==='group'&&selectedGroupObj&&<div style={{marginTop:12}}><h4 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Select Orders to Deliver</h4><div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
        {groupPendingOrders.length===0?<div style={{padding:16,textAlign:'center',color:'var(--text-secondary)',fontSize:13}}>No pending orders for this group</div>:groupPendingOrders.map(o=>{const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;return <label key={o.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #f1f5f9',background:selectedGroupOrders.includes(o.id)?'var(--primary-bg)':''}}>
          <input type="checkbox" checked={selectedGroupOrders.includes(o.id)} onChange={()=>toggleGroupOrder(o.id)} style={{width:'auto'}}/><span style={{fontWeight:500,flex:1}}>{o.customer}</span><span style={{fontSize:12,color:'var(--text-secondary)'}}>{fmtDate(o.date)}</span><span className="tag">{pc} product{pc!==1?'s':''}</span></label>;})}
      </div></div>}
      {hasSelection&&<>
        <h4 style={{fontSize:14,fontWeight:600,margin:'16px 0 8px'}}>{mode==='group'?'Combined Products':'Products to Deliver'}</h4>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
          {Object.entries(products).filter(([,v])=>v>0).map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <div key={pid} style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,flex:1}}>{p?.name}</span><input type="number" step="0.1" style={{width:80}} value={qty} onChange={e=>{const v=parseFloat(e.target.value)||0;setProducts(ps=>({...ps,[pid]:v}));}}/></div>;})}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:16}}>
          <div className="form-group"><label>Pumps Out (qty)</label><input type="number" value={pumpsOut} onChange={e=>setPumpsOut(e.target.value)} placeholder="0"/></div>
          <div className="form-group"><label>Pump Return Date</label><input type="date" value={pumpsReturnDate} onChange={e=>setPumpsReturnDate(e.target.value)}/></div>
          <div className="form-group"><label>Totes (qty)</label><input type="number" value={totes} onChange={e=>setTotes(e.target.value)} placeholder="0"/></div>
        </div>

        {/* ── PHOTO / VIDEO CAPTURE ── */}
        <div style={{marginTop:16,padding:16,background:'#f8fafc',borderRadius:8,border:'1px solid var(--border)'}}>
          <h4 style={{fontSize:14,fontWeight:600,marginBottom:10}}>Photos & Video</h4>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-secondary" onClick={()=>{setCameraMode('photo');startCamera();}}><Icon name="camera" size={14}/>Take Photo</button>
            <button className="btn btn-secondary" onClick={()=>{setCameraMode('video');startCamera();}}><Icon name="camera" size={14}/>Record Video</button>
            <button className="btn btn-secondary" onClick={()=>fileInputRef.current?.click()}><Icon name="upload" size={14}/>Upload File</button>
            <input ref={fileInputRef} type="file" accept="image/*,video/*" multiple style={{display:'none'}} onChange={handleFileUpload} capture="environment"/>
          </div>
          {showCamera&&<div style={{marginTop:12}}>
            <video ref={videoRef} autoPlay playsInline muted className="camera-preview"/>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              {cameraMode==='photo'?<button className="btn btn-primary" onClick={capturePhoto}><Icon name="camera" size={14}/>Capture</button>:
                recording?<button className="btn btn-danger" onClick={stopRecording}>Stop Recording</button>:<button className="btn btn-danger" onClick={startRecording}>Start Recording (max 30s)</button>}
              <button className="btn btn-secondary" onClick={stopCamera}>Close Camera</button>
            </div>
          </div>}
          {attachments.length>0&&<div className="photo-grid">{attachments.map((a,i)=><div key={i} className="photo-thumb">
            {a.type==='photo'?<img src={a.data}/>:<video src={a.data} controls/>}
            <button className="photo-remove" onClick={()=>removeAttachment(i)}>x</button>
          </div>)}</div>}
        </div>

        <label style={{display:'flex',alignItems:'center',gap:8,marginTop:12,cursor:'pointer',fontSize:13}}>
          <input type="checkbox" checked={markDelivered} onChange={e=>setMarkDelivered(e.target.checked)} style={{width:'auto'}}/>
          Mark {mode==='group'?'all selected orders':'order'} as "Paid & Delivered"
        </label>
      </>}
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>{stopCamera();onClose();}}>Cancel</button><button className="btn btn-success" onClick={save} disabled={!hasSelection}><Icon name="truck" size={14}/>Record Delivery</button></div>
  </Modal>;
}

function DeliveryTicketModal({delivery,onClose}) {
  const ticketRef=useRef();
  const handlePrint=()=>{
    const content=ticketRef.current.innerHTML;
    const win=window.open('','_blank','width=800,height=600');
    win.document.write(`<!DOCTYPE html><html><head><title>Delivery Ticket - ${delivery.customer}</title><style>body{font-family:'Inter',Arial,sans-serif;padding:40px;color:#1e293b}h2{margin:0 0 4px;font-size:22px}h4{margin:0;font-size:13px;color:#64748b;font-weight:400}table{width:100%;border-collapse:collapse;margin:20px 0}th{text-align:left;padding:10px 12px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-size:12px;font-weight:600;text-transform:uppercase}td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:14px}.sig{margin-top:60px;display:grid;grid-template-columns:1fr 1fr;gap:40px}.sig-line{border-top:1px solid #1e293b;padding-top:8px;font-size:12px;color:#64748b}.photos{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.photos img{max-width:200px;border-radius:4px}@media print{body{padding:20px}}</style></head><body>${content}</body></html>`);
    win.document.close();win.print();
  };
  const productEntries=Object.entries(delivery.products||{}).filter(([,v])=>v>0);
  const atts=delivery.attachments||[];
  return <Modal title="Delivery Ticket" onClose={onClose} wide>
    <div className="modal-body"><div ref={ticketRef}>
      <div style={{textAlign:'center',marginBottom:24,paddingBottom:16,borderBottom:'2px solid #1e293b'}}><h2>Quantum Ag — Delivery Ticket</h2><h4>BWF Product Delivery</h4></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        <p style={{fontSize:14}}><strong>Customer:</strong> {delivery.customer}</p>
        <p style={{fontSize:14}}><strong>Delivery Date:</strong> {fmtDate(delivery.date)}</p>
        {delivery.pumpsOut>0&&<p style={{fontSize:14}}><strong>Pumps Out:</strong> {delivery.pumpsOut}{delivery.pumpsReturnDate?` (return by ${fmtDate(delivery.pumpsReturnDate)})`:''}</p>}
        {delivery.totes>0&&<p style={{fontSize:14}}><strong>Totes:</strong> {delivery.totes}</p>}
      </div>
      {productEntries.length>0&&<table><thead><tr><th>Product</th><th style={{textAlign:'right'}}>Quantity</th></tr></thead><tbody>
        {productEntries.map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <tr key={pid}><td>{p?.name||pid}</td><td style={{textAlign:'right',fontWeight:600}}>{fmt(qty)}</td></tr>;})}
      </tbody></table>}
      {atts.length>0&&<div><h4 style={{fontSize:13,fontWeight:600,margin:'16px 0 8px'}}>Attached Photos/Video</h4><div className="photos" style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {atts.filter(a=>a.type==='photo').map((a,i)=><img key={i} src={a.data} style={{maxWidth:200,borderRadius:4}}/>)}
      </div></div>}
      <div style={{marginTop:60,display:'grid',gridTemplateColumns:'1fr 1fr',gap:40}}>
        <div><div style={{borderTop:'1px solid #1e293b',paddingTop:8,fontSize:12,color:'#64748b'}}>Driver Signature</div></div>
        <div><div style={{borderTop:'1px solid #1e293b',paddingTop:8,fontSize:12,color:'#64748b'}}>Customer Signature</div></div>
      </div>
      <div style={{marginTop:40,paddingTop:16,borderTop:'1px solid #e2e8f0',fontSize:12,color:'#94a3b8',textAlign:'center'}}>Quantum Ag — Generated {new Date().toLocaleDateString()}</div>
    </div></div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Close</button><button className="btn btn-primary" onClick={handlePrint}><Icon name="printer" size={14}/>Print / Save PDF</button></div>
  </Modal>;
}

// ── SETTINGS SCREEN ──
// ══════════════════════════
function SettingsScreen() {
  const {data,addGroup,updateGroup,deleteGroup,updateSettings,exportData,importData,showToast,setData,sbConnected,archivedYears,availableYears} = useApp();
  const [showGroupModal,setShowGroupModal] = useState(false);
  const [editGroup,setEditGroup] = useState(null);
  const fileRef=useRef();
  const fy=data.settings||{};
  const [fyStartMonth,setFyStartMonth]=useState(fy.fiscalYearStart?.month||1);
  const [fyStartDay,setFyStartDay]=useState(fy.fiscalYearStart?.day||1);
  const [fyEndMonth,setFyEndMonth]=useState(fy.fiscalYearEnd?.month||12);
  const [fyEndDay,setFyEndDay]=useState(fy.fiscalYearEnd?.day||31);
  const [sbUrl,setSbUrl]=useState(fy.supabase?.url||'');
  const [sbKey,setSbKey]=useState(fy.supabase?.anonKey||'');

  const handleImport=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>importData(ev.target.result);r.readAsText(file);};
  const saveFiscalYear=()=>{updateSettings({fiscalYearStart:{month:parseInt(fyStartMonth),day:parseInt(fyStartDay)},fiscalYearEnd:{month:parseInt(fyEndMonth),day:parseInt(fyEndDay)}});showToast('Fiscal year updated');};
  const toggleArchive=year=>{const archived=archivedYears.includes(year)?archivedYears.filter(y=>y!==year):[...archivedYears,year];updateSettings({archivedYears:archived});showToast(archivedYears.includes(year)?'Year unarchived':'Year archived');};
  const saveSupabase=()=>{updateSettings({supabase:{url:sbUrl,anonKey:sbKey,enabled:!!(sbUrl&&sbKey)}});showToast('Supabase settings saved');};

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  return <div className="fade-in">
    <div className="page-header"><h2>Settings</h2><p>Manage groups, fiscal year, and data sync</p></div>

    {/* Customer Groups */}
    <div className="card"><div className="card-header"><h3>Customer Groups</h3><button className="btn btn-primary btn-sm" onClick={()=>{setEditGroup(null);setShowGroupModal(true);}}><Icon name="plus" size={14}/>Add Group</button></div>
      <table><thead><tr><th>Group Name</th><th>Members</th><th></th></tr></thead><tbody>
        {data.customerGroups.map((g,i)=><tr key={i}><td style={{fontWeight:600}}>{g.name}</td><td>{g.members.join(', ')}</td><td style={{textAlign:'right'}}>
          <button className="btn-icon" style={{marginRight:4}} onClick={()=>{setEditGroup(i);setShowGroupModal(true);}}><Icon name="edit" size={14}/></button>
          <button className="btn-icon" onClick={()=>{if(confirm('Delete this group?'))deleteGroup(i);}}><Icon name="trash" size={14}/></button></td></tr>)}
      </tbody></table>
    </div>

    {/* Fiscal Year */}
    <div className="card"><div className="card-header"><h3>Fiscal Year Configuration</h3></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Define custom start/end dates for your order year. Orders are categorized into fiscal years based on their order date.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr auto',gap:12,alignItems:'end'}}>
        <div className="form-group"><label>Start Month</label><select value={fyStartMonth} onChange={e=>setFyStartMonth(e.target.value)}>{months.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
        <div className="form-group"><label>Start Day</label><input type="number" min="1" max="31" value={fyStartDay} onChange={e=>setFyStartDay(e.target.value)}/></div>
        <div className="form-group"><label>End Month</label><select value={fyEndMonth} onChange={e=>setFyEndMonth(e.target.value)}>{months.map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></div>
        <div className="form-group"><label>End Day</label><input type="number" min="1" max="31" value={fyEndDay} onChange={e=>setFyEndDay(e.target.value)}/></div>
        <button className="btn btn-primary" onClick={saveFiscalYear}>Save</button>
      </div>
    </div>

    {/* Year Archive */}
    <div className="card"><div className="card-header"><h3>Year Archive</h3></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Archive previous years to hide them from the default view. Archived years can still be accessed via the "Show Archived" toggle on the Orders screen.</p>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
        {availableYears.map(y=><div key={y} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',border:'1px solid var(--border)',borderRadius:6,background:archivedYears.includes(y)?'#f1f5f9':'#fff'}}>
          <span style={{fontWeight:600,fontSize:14}}>{y}</span>
          <button className="btn btn-sm btn-secondary" onClick={()=>toggleArchive(y)}>{archivedYears.includes(y)?'Unarchive':'Archive'}</button>
        </div>)}
      </div>
    </div>

    {/* Supabase */}
    <div className="card"><div className="card-header"><h3><Icon name="cloud" size={18} style={{marginRight:6}}/>Supabase Multi-User Sync</h3>
      <span className={`sb-status ${sbConnected?'sb-connected':'sb-disconnected'}`}><span className={`status-dot ${sbConnected?'dot-paid':'dot-pending'}`}></span>{sbConnected?'Connected':'Disconnected'}</span></div>
      <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Connect to a Supabase project to enable real-time multi-user access. All users connected to the same project will see live updates. Without Supabase, data is stored locally in the browser.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label>Supabase Project URL</label><input placeholder="https://xxxx.supabase.co" value={sbUrl} onChange={e=>setSbUrl(e.target.value)}/></div>
        <div className="form-group"><label>Anon / Public Key</label><input placeholder="eyJhbGciOi..." value={sbKey} onChange={e=>setSbKey(e.target.value)}/></div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-primary" onClick={saveSupabase}>Save & Connect</button>
        {sbConnected&&<button className="btn btn-secondary" onClick={()=>{updateSettings({supabase:{url:'',anonKey:'',enabled:false}});showToast('Disconnected');}}>Disconnect</button>}
      </div>
    </div>

    {/* Data Management */}
    <div className="card"><div className="card-header"><h3>Data Management</h3></div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        <button className="btn btn-secondary" onClick={exportData}><Icon name="download" size={16}/>Export Data (JSON)</button>
        <button className="btn btn-secondary" onClick={()=>fileRef.current.click()}><Icon name="upload" size={16}/>Import Data</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
        <button className="btn btn-danger" onClick={()=>{if(confirm('Reset all data to defaults? This cannot be undone.')){setData(INITIAL_DATA);showToast('Data reset');}}}>Reset to Defaults</button>
      </div>
    </div>
    {showGroupModal&&<GroupModal groupIndex={editGroup} onClose={()=>setShowGroupModal(false)}/>}
  </div>;
}

function GroupModal({groupIndex,onClose}) {
  const {data,addGroup,updateGroup}=useApp();
  const existing=groupIndex!==null?data.customerGroups[groupIndex]:null;
  const [name,setName]=useState(existing?.name||'');const [members,setMembers]=useState(existing?.members||[]);const [search,setSearch]=useState('');
  const toggle=c=>setMembers(ms=>ms.includes(c)?ms.filter(m=>m!==c):[...ms,c]);
  const save=()=>{if(!name){alert('Enter group name');return;}if(members.length<2){alert('Add at least 2 members');return;}if(existing)updateGroup(groupIndex,{name,members});else addGroup({name,members});onClose();};
  return <Modal title={existing?'Edit Group':'New Group'} onClose={onClose}>
    <div className="modal-body">
      <div className="form-group"><label>Group Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g., Webster Ag"/></div>
      <div className="form-group"><label>Members</label><input placeholder="Search customers..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:8}}/>
        <div style={{maxHeight:250,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
          {ALL_CUSTOMERS.filter(c=>c.toLowerCase().includes(search.toLowerCase())).map(c=><label key={c} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',cursor:'pointer',fontSize:13,background:members.includes(c)?'var(--primary-bg)':''}}>
            <input type="checkbox" checked={members.includes(c)} onChange={()=>toggle(c)} style={{width:'auto'}}/>{c}</label>)}
        </div></div>
      {members.length>0&&<div style={{marginTop:8}}><span style={{fontSize:12,color:'var(--text-secondary)'}}>Selected: </span>{members.map(m=><span key={m} className="tag" style={{marginRight:4}}>{m}</span>)}</div>}
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={save}>Save Group</button></div>
  </Modal>;
}

// ══════════════════
// ── MAIN APP ──
// ══════════════════
function App() {
  const {toast,activeYear,setActiveYear,visibleYears,sbConnected} = useApp();
  const [page,setPage] = useState('dashboard');
  const [pageArg,setPageArg] = useState(null);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const navigate=(pg,arg)=>{setPage(pg);setPageArg(arg||null);setSidebarOpen(false);};
  const navItems=[{id:'dashboard',label:'Dashboard',icon:'dashboard'},{id:'inventory',label:'Inventory',icon:'inventory'},{id:'orders',label:'Orders',icon:'orders'},{id:'deliveries',label:'Deliveries',icon:'truck'},{id:'customers',label:'Customers',icon:'users'},{id:'settings',label:'Settings',icon:'settings'}];
  const renderPage=()=>{switch(page){case'dashboard':return<Dashboard/>;case'inventory':return<InventoryScreen/>;case'orders':return<OrdersScreen onNavigate={navigate}/>;case'deliveries':return<DeliveriesScreen onNavigate={navigate}/>;case'customers':return<CustomersScreen onNavigate={navigate}/>;case'customer-detail':return<CustomerDetail customerName={pageArg} onBack={()=>navigate('customers')}/>;case'settings':return<SettingsScreen/>;default:return<Dashboard/>;}};
  return <>
    <div className="mobile-header"><button className="hamburger" onClick={()=>setSidebarOpen(!sidebarOpen)}><Icon name="menu" size={24}/></button><h1>Quantum Ag</h1><div style={{width:24}}></div></div>
    <div className={`sidebar ${sidebarOpen?'open':''}`}>
      <div className="sidebar-header"><h1>Quantum Ag</h1><p>Inventory & Delivery Tracker</p></div>
      <div className="nav-items">
        {navItems.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>navigate(n.id)}><Icon name={n.icon}/>{n.label}</div>)}
      </div>
      <div className="year-select"><span>Year:</span><select value={activeYear} onChange={e=>setActiveYear(e.target.value)}>{visibleYears.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
      <div style={{padding:'8px 12px',borderTop:'1px solid #1e293b',fontSize:11,color:'#475569',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>v3.0</span>
        <span className={`sb-status ${sbConnected?'sb-connected':'sb-disconnected'}`} style={{padding:'2px 8px',fontSize:10}}>
          <span className={`status-dot ${sbConnected?'dot-paid':'dot-pending'}`}></span>{sbConnected?'Synced':'Local'}
        </span>
      </div>
    </div>
    <div className="main">{renderPage()}</div>
    {toast&&<div className="toast">{toast}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppProvider><App/></AppProvider>);
</script>
</body>
</html>
