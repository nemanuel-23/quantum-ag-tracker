// ── AUTH GATE ──
function AuthGate({children}) {
  const [user,setUser] = useState(null);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    if(!sbClient){setLoading(false);return;}
    // Check current session
    sbClient.auth.getUser().then(({data})=>{
      setUser(data?.user||null);
      setLoading(false);
    });
    // Listen for auth changes (magic link redirect)
    const {data:{subscription}} = sbClient.auth.onAuthStateChange((event,session)=>{
      setUser(session?.user||null);
      if(event==='SIGNED_IN') setLoading(false);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const handleLogout = async () => {
    await sbClient.auth.signOut();
    setUser(null);
  };

  if(loading) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)'}}>
    <div style={{textAlign:'center',color:'#fff'}}>
      <div style={{width:40,height:40,border:'3px solid rgba(255,255,255,.2)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .8s linear infinite',margin:'0 auto 16px'}}></div>
      <p style={{fontSize:14,opacity:.8}}>Loading...</p>
    </div>
  </div>;

  if(!user) return <LoginScreen/>;

  return <AuthContext.Provider value={{user,logout:handleLogout}}>
    {children}
  </AuthContext.Provider>;
}

const AuthContext = createContext();
function useAuth(){return useContext(AuthContext);}

// ── SORT HOOK ──
function useSort(defaultKey,defaultDir='asc') {
  const [sortKey,setSortKey] = useState(defaultKey||null);
  const [sortDir,setSortDir] = useState(defaultDir);
  const toggleSort = key => {if(sortKey===key){setSortDir(d=>d==='asc'?'desc':'asc');}else{setSortKey(key);setSortDir('asc');}};
  const sortFn = (rows,getVal) => {
    if(!sortKey) return rows;
    return [...rows].sort((a,b)=>{
      let va=getVal(a,sortKey),vb=getVal(b,sortKey);
      if(va==null) va='';if(vb==null) vb='';
      if(typeof va==='string'&&typeof vb==='string'){const c=va.localeCompare(vb,undefined,{numeric:true,sensitivity:'base'});return sortDir==='asc'?c:-c;}
      const na=typeof va==='number'?va:parseFloat(va)||0;const nb=typeof vb==='number'?vb:parseFloat(vb)||0;
      return sortDir==='asc'?na-nb:nb-na;
    });
  };
  return {sortKey,sortDir,toggleSort,sortFn};
}
function SortTh({label,sortKey,colKey,sortDir,onSort,style,...rest}) {
  const active=sortKey===colKey;
  return <th style={{cursor:'pointer',userSelect:'none',...style}} onClick={()=>onSort(colKey)} {...rest}>
    <span style={{display:'inline-flex',alignItems:'center',gap:3}}>{label}<span style={{fontSize:9,opacity:active?1:0.3,transition:'opacity .15s'}}>{active?(sortDir==='asc'?'▲':'▼'):'▲'}</span></span>
  </th>;
}

function getFiscalYear(dateStr, fyStart, fyLabel) {
  if(!dateStr) return 'Undated';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d)) return 'Undated';
  const year = d.getFullYear();
  const month = d.getMonth()+1;
  const day = d.getDate();
  const sm = fyStart?.month||1; const sd = fyStart?.day||1;
  if(sm===1&&sd===1) return String(year);
  const startYear = (month>sm||(month===sm&&day>=sd)) ? year : year-1;
  const endYear = startYear+1;
  const lbl = fyLabel||'range';
  if(lbl==='end') return String(endYear);
  if(lbl==='start') return String(startYear);
  return startYear+'-'+endYear;
}
function getAvailableYears(orders, fyStart, fyLabel) {
  const years = new Set();
  orders.forEach(o=>years.add(getFiscalYear(o.date,fyStart,fyLabel)));
  if(years.size===0) years.add(getFiscalYear(today(),fyStart,fyLabel));
  return [...years].sort().reverse();
}

// ── SUPABASE LAYER ──
// Supabase data sync uses the same hardcoded client
const supabaseClient = sbClient;

// ── CONTEXT ──
const AppContext = createContext();
function useApp(){return useContext(AppContext);}

function AppProvider({children}) {
  const [data, setData] = useState(() => {
    const saved = localStorage.getItem('quantumag_data');
    if(saved){
      try{
        const parsed = JSON.parse(saved);
        if(!parsed.settings) parsed.settings = INITIAL_DATA.settings;
        if(!parsed.deliveryTickets) parsed.deliveryTickets = [];
        return parsed;
      }catch(e){}
    }
    return INITIAL_DATA;
  });
  const [toast,setToast] = useState(null);
  const [sbConnected,setSbConnected] = useState(!!supabaseClient);
  const [activeYear,setActiveYear] = useState(()=>getFiscalYear(today(),data.settings?.fiscalYearStart,data.settings?.fiscalYearLabel));
  const isRemoteUpdate = useRef(false);
  const hasFetched = useRef(false);

  const showToast = msg =>{setToast(msg);setTimeout(()=>setToast(null),3000);};

  // Save to localStorage on every change
  useEffect(()=>{localStorage.setItem('quantumag_data',JSON.stringify(data));localStorage.setItem('quantumag_version',APP_VERSION);},[data]);

  // Push to Supabase whenever data changes — but ONLY after initial fetch completes
  useEffect(()=>{
    if(!supabaseClient) return;
    if(!hasFetched.current) return;
    if(isRemoteUpdate.current){isRemoteUpdate.current=false;return;}
    supabaseClient.from('app_data').upsert({id:SB_ROW_ID,data:data,updated_at:new Date().toISOString()})
      .then(({error})=>{if(error)console.warn('Supabase push error:',error.message);});
  },[data]);

  // Supabase: fetch on startup + listen for realtime changes
  useEffect(()=>{
    if(!supabaseClient) {setSbConnected(false);return;}
    setSbConnected(true);
    // Fetch latest data from Supabase on startup
    supabaseClient.from('app_data').select('*').eq('id',SB_ROW_ID).limit(1).then(({data:rows,error})=>{
      if(!error && rows && rows.length>0 && rows[0].data){
        const remote = typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;
        isRemoteUpdate.current=true;
        setData(d=>{
          const merged={...d,...remote};
          merged.settings={...d.settings,...(remote.settings||{}),supabase:{url:SB_URL,anonKey:SB_ANON_KEY,enabled:true}};
          if(!merged.deliveryTickets) merged.deliveryTickets=[];
          return merged;
        });
      }
      if(error) console.warn('Supabase data fetch:',error.message);
      // Enable pushing only AFTER initial fetch is done
      hasFetched.current=true;
    });
    // Listen for realtime changes from other devices
    const channel = supabaseClient.channel('realtime_sync').on('postgres_changes',{event:'*',schema:'public',table:'app_data'},(payload)=>{
      if(payload.new?.data){
        const remote = typeof payload.new.data === 'string' ? JSON.parse(payload.new.data) : payload.new.data;
        isRemoteUpdate.current=true;
        setData(d=>{
          const merged={...d,...remote};
          merged.settings={...d.settings,...(remote.settings||{}),supabase:{url:SB_URL,anonKey:SB_ANON_KEY,enabled:true}};
          return merged;
        });
      }
    }).subscribe();
    return ()=>{supabaseClient.removeChannel(channel);};
  },[]);

  const updateData = (updater)=>{
    setData(d=>typeof updater==='function'?updater(d):updater);
  };

  const updateInventory=(pid,field,val)=>{updateData(d=>({...d,inventory:{...d.inventory,[pid]:{...d.inventory[pid]||{starting:0,additions:[]},[field]:val}}}));};
  const addInventory=(pid,add)=>{updateData(d=>{const inv=d.inventory[pid]||{starting:0,additions:[]};return{...d,inventory:{...d.inventory,[pid]:{...inv,additions:[...inv.additions,add]}}};});};
  const addOrder=o=>{updateData(d=>({...d,orders:[...d.orders,{...o,id:uid()}]}));showToast('Order added');};
  const updateOrder=(id,u)=>{updateData(d=>({...d,orders:d.orders.map(o=>o.id===id?{...o,...u}:o)}));};
  const deleteOrder=id=>{updateData(d=>({...d,orders:d.orders.filter(o=>o.id!==id)}));showToast('Order deleted');};
  const addDelivery=del=>{updateData(d=>({...d,deliveries:[...d.deliveries,{...del,id:uid()}]}));showToast('Delivery recorded');};
  const updateDelivery=(id,u)=>{updateData(d=>({...d,deliveries:d.deliveries.map(dl=>dl.id===id?{...dl,...u}:dl)}));};
  const addGroup=g=>{updateData(d=>({...d,customerGroups:[...d.customerGroups,g]}));};
  const updateGroup=(i,g)=>{updateData(d=>({...d,customerGroups:d.customerGroups.map((x,j)=>j===i?g:x)}));};
  const deleteGroup=i=>{updateData(d=>({...d,customerGroups:d.customerGroups.filter((_,j)=>j!==i)}));};
  const updateSettings=s=>{updateData(d=>({...d,settings:{...d.settings,...s}}));};
  const saveDeliveryTicket=t=>{updateData(d=>({...d,deliveryTickets:[...d.deliveryTickets,{...t,id:uid(),savedAt:today()}]}));};

  const fyStart = data.settings?.fiscalYearStart||{month:1,day:1};
  const fyLabel = data.settings?.fiscalYearLabel||'end';
  const availableYears = useMemo(()=>getAvailableYears(data.orders,fyStart,fyLabel),[data.orders,fyStart,fyLabel]);
  const archivedYears = data.settings?.archivedYears||[];
  const visibleYears = availableYears.filter(y=>!archivedYears.includes(y));

  const yearOrders = useMemo(()=>{
    return data.orders.filter(o=>getFiscalYear(o.date,fyStart,fyLabel)===activeYear);
  },[data.orders,activeYear,fyStart,fyLabel]);

  const activeProducts = useMemo(()=>{
    const used = new Set();
    Object.keys(data.inventory).forEach(pid=>{const inv=data.inventory[pid];if(inv.starting>0||inv.additions.length>0)used.add(pid);});
    data.orders.forEach(o=>Object.keys(o.products).forEach(pid=>{if(o.products[pid]>0)used.add(pid);}));
    return ALL_PRODUCTS.filter(p=>used.has(p.id));
  },[data]);

  const activeCustomers = useMemo(()=>{
    const used=new Set(data.orders.map(o=>o.customer));
    return ALL_CUSTOMERS.filter(c=>used.has(c));
  },[data]);

  const getProductTotalSold=useCallback(pid=>data.orders.reduce((s,o)=>s+(o.products[pid]||0),0),[data.orders]);
  const getProductDelivered=useCallback(pid=>data.deliveries.reduce((s,d)=>s+(d.products?.[pid]||0),0),[data.deliveries]);
  const getProductAvailable=useCallback(pid=>{const inv=data.inventory[pid]||{starting:0,additions:[]};const added=inv.additions.reduce((s,a)=>s+a.qty,0);return inv.starting+added-getProductTotalSold(pid);},[data.inventory,getProductTotalSold]);
  const getProductSoldNotDelivered=useCallback(pid=>getProductTotalSold(pid)-getProductDelivered(pid),[getProductTotalSold,getProductDelivered]);
  // Per-order delivery tracking: how much of each product on a specific order has been delivered
  const getOrderDelivered=useCallback((orderId)=>{
    const totals={};
    data.deliveries.filter(d=>d.orderId===orderId).forEach(d=>{
      Object.entries(d.products||{}).forEach(([pid,qty])=>{totals[pid]=(totals[pid]||0)+qty;});
    });
    return totals;
  },[data.deliveries]);
  const getOrderDeliveryCount=useCallback((orderId)=>data.deliveries.filter(d=>d.orderId===orderId).length,[data.deliveries]);
  const isOrderFullyDelivered=useCallback((orderId)=>{
    const order=data.orders.find(o=>o.id===orderId);if(!order)return false;
    const delivered=getOrderDelivered(orderId);
    return Object.entries(order.products).every(([pid,qty])=>qty<=0||(delivered[pid]||0)>=qty);
  },[data.orders,getOrderDelivered]);

  const exportData=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='quantum-ag-backup-'+today()+'.json';a.click();URL.revokeObjectURL(u);showToast('Exported');};
  const importData=json=>{try{setData(JSON.parse(json));showToast('Imported');}catch(e){showToast('Invalid file');}};

  return <AppContext.Provider value={{data,setData:updateData,activeProducts,activeCustomers,updateInventory,addInventory,addOrder,updateOrder,deleteOrder,addDelivery,updateDelivery,addGroup,updateGroup,deleteGroup,updateSettings,saveDeliveryTicket,getProductTotalSold,getProductDelivered,getProductAvailable,getProductSoldNotDelivered,getOrderDelivered,getOrderDeliveryCount,isOrderFullyDelivered,exportData,importData,showToast,toast,sbConnected,activeYear,setActiveYear,availableYears,visibleYears,archivedYears,yearOrders,fyStart,fyLabel}}>{children}</AppContext.Provider>;
}

// ── MODAL ──
function Modal({title,onClose,children,wide}){
  return <div className="modal-overlay" onClick={onClose}><div className="modal" style={wide?{maxWidth:800}:{}} onClick={e=>e.stopPropagation()}>
    <div className="modal-header"><h3>{title}</h3><button className="btn-icon" onClick={onClose}><Icon name="x"/></button></div>{children}
  </div></div>;
}

// ── DASHBOARD WITH DRILL-DOWNS ──
// ══════════════════════════════════
function Dashboard() {
  const {data,activeProducts,yearOrders,activeYear,getProductAvailable,getProductTotalSold,getProductDelivered,getProductSoldNotDelivered} = useApp();
  const [drillDown,setDrillDown] = useState(null);
  const [expandedProduct,setExpandedProduct] = useState(null);

  const productsNeeded = activeProducts.filter(p=>getProductAvailable(p.id)<0);
  const productsAvail = activeProducts.filter(p=>getProductAvailable(p.id)>0);
  const ordersReady = yearOrders.filter(o=>o.status!=='paid');
  const ordersDelivered = yearOrders.filter(o=>o.status==='paid');

  const kpis = [
    {key:'needed',label:'Products Needed',value:productsNeeded.length,color:'var(--danger)',sub:'Negative inventory — need to order',icon:'alert'},
    {key:'available',label:'Products Available',value:productsAvail.length,color:'var(--success)',sub:'In stock and ready',icon:'check'},
    {key:'ready',label:'Orders to Deliver',value:ordersReady.length,color:'var(--warning)',sub:'Not yet marked delivered',icon:'truck'},
    {key:'delivered',label:'Orders Delivered',value:ordersDelivered.length,color:'var(--success)',sub:activeYear+' completed',icon:'check'},
    {key:'total',label:'Total Orders',value:yearOrders.length,color:'var(--primary)',sub:activeYear+' all statuses',icon:'orders'}
  ];

  const toggle = key => setDrillDown(drillDown===key?null:key);

  // Find orders that consume a specific product
  const ordersForProduct = pid => data.orders.filter(o=>(o.products[pid]||0)>0);

  return (
    <div className="fade-in">
      <div className="page-header"><h2>Dashboard</h2><p>Year: {activeYear} — Click any card to drill down</p></div>
      <div className="kpi-grid">
        {kpis.map(k=>(
          <div key={k.key} className={`kpi-card ${drillDown===k.key?'active':''}`} onClick={()=>toggle(k.key)}>
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value" style={{color:k.color}}>{k.value}</div>
            <div className="kpi-sub">{k.sub}</div>
            <div className="kpi-arrow"><Icon name="down" size={16}/></div>
          </div>
        ))}
      </div>

      {/* ── DRILL-DOWN: Products Needed ── */}
      {drillDown==='needed' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>Products Needed — Negative Inventory</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>
          {productsNeeded.length===0?<p style={{color:'var(--text-secondary)',fontSize:13}}>All products are in stock.</p>:(
            <table>
              <thead><tr><th>Product</th><th style={{textAlign:'right'}}>Available</th><th style={{textAlign:'right'}}>Deficit</th><th style={{textAlign:'right'}}>Total Sold</th><th></th></tr></thead>
              <tbody>
                {productsNeeded.sort((a,b)=>getProductAvailable(a.id)-getProductAvailable(b.id)).map(p=>{
                  const avail=getProductAvailable(p.id);
                  const orders=ordersForProduct(p.id);
                  const isExpanded=expandedProduct===p.id;
                  return <React.Fragment key={p.id}>
                    <tr className="expand-row" onClick={()=>setExpandedProduct(isExpanded?null:p.id)}>
                      <td style={{fontWeight:500}}><Icon name={isExpanded?'down':'chevron'} size={14} style={{marginRight:6}}/>{p.name}</td>
                      <td className="inv-cell negative">{fmt(avail)}</td>
                      <td className="inv-cell negative">{fmt(Math.abs(avail))} needed</td>
                      <td className="inv-cell">{fmt(getProductTotalSold(p.id))}</td>
                      <td style={{fontSize:11,color:'var(--text-secondary)'}}>{orders.length} order{orders.length!==1?'s':''}</td>
                    </tr>
                    {isExpanded && (
                      <tr><td colSpan="5" style={{padding:'4px 12px 12px'}}>
                        <div className="sub-table">
                          <table><thead><tr><th>Customer</th><th>Order Date</th><th style={{textAlign:'right'}}>Qty Ordered</th><th>Status</th></tr></thead>
                          <tbody>{orders.map(o=>{const st=getStatus(o.status);return(
                            <tr key={o.id}><td>{o.customer}</td><td>{fmtDate(o.date)}</td><td className="inv-cell">{fmt(o.products[p.id])}</td>
                            <td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td></tr>
                          );})}</tbody></table>
                        </div>
                      </td></tr>
                    )}
                  </React.Fragment>;
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* ── DRILL-DOWN: Products Available ── */}
      {drillDown==='available' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>Products Available — In Stock</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>
          <table>
            <thead><tr><th>Product</th><th style={{textAlign:'right'}}>Starting</th><th style={{textAlign:'right'}}>Added</th><th style={{textAlign:'right'}}>Sold</th><th style={{textAlign:'right'}}>Available</th></tr></thead>
            <tbody>
              {productsAvail.sort((a,b)=>getProductAvailable(b.id)-getProductAvailable(a.id)).map(p=>{
                const inv=data.inventory[p.id]||{starting:0,additions:[]};
                const added=inv.additions.reduce((s,a)=>s+a.qty,0);
                return <tr key={p.id}><td style={{fontWeight:500}}>{p.name}</td><td className="inv-cell">{fmt(inv.starting)}</td><td className="inv-cell positive">{added>0?'+'+fmt(added):'—'}</td><td className="inv-cell">{fmt(getProductTotalSold(p.id))}</td><td className="inv-cell positive" style={{fontWeight:700}}>{fmt(getProductAvailable(p.id))}</td></tr>;
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* ── DRILL-DOWN: Orders Ready ── */}
      {drillDown==='ready' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>Orders to Deliver — {activeYear}</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>
          <table>
            <thead><tr><th>Customer</th><th>Date</th><th>Products</th><th>Status</th></tr></thead>
            <tbody>{ordersReady.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0)).map(o=>{const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;return(
              <tr key={o.id}><td style={{fontWeight:500}}>{o.customer}</td><td>{fmtDate(o.date)}</td><td><span className="tag">{pc} product{pc!==1?'s':''}</span></td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td></tr>
            );})}</tbody>
          </table>
        </div>
      )}

      {/* ── DRILL-DOWN: Delivered ── */}
      {drillDown==='delivered' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>Orders Delivered — {activeYear}</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>
          {ordersDelivered.length===0?<p style={{color:'var(--text-secondary)',fontSize:13}}>No deliveries yet for {activeYear}.</p>:(
            <table><thead><tr><th>Customer</th><th>Date</th><th>Products</th></tr></thead>
            <tbody>{ordersDelivered.map(o=>{const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;return(
              <tr key={o.id}><td style={{fontWeight:500}}>{o.customer}</td><td>{fmtDate(o.date)}</td><td><span className="tag">{pc} product{pc!==1?'s':''}</span></td></tr>
            );})}</tbody></table>
          )}
        </div>
      )}

      {/* ── DRILL-DOWN: Total Orders ── */}
      {drillDown==='total' && (
        <div className="drill-panel">
          <div className="drill-header"><h3>All Orders — {activeYear}</h3><button className="btn-icon" onClick={()=>setDrillDown(null)}><Icon name="x"/></button></div>
          <table><thead><tr><th>Customer</th><th>Date</th><th>Products</th><th>Status</th><th>Invoiced</th></tr></thead>
          <tbody>{yearOrders.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).map(o=>{const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;return(
            <tr key={o.id}><td style={{fontWeight:500}}>{o.customer}</td><td>{fmtDate(o.date)}</td><td><span className="tag">{pc} product{pc!==1?'s':''}</span></td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td><td>{o.invoiced?'Yes':'No'}</td></tr>
          );})}</tbody></table>
        </div>
      )}

      {/* Status summary + groups card */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div className="card">
          <div className="card-header"><h3>Order Status Breakdown</h3></div>
          {STATUS_OPTIONS.map(s=>{const c=yearOrders.filter(o=>o.status===s.value).length;return(
            <div key={s.value} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
              <span className={`status-dot ${s.dot}`}></span><span style={{flex:1,fontSize:13}}>{s.label}</span><span style={{fontWeight:700,fontSize:16}}>{c}</span>
            </div>
          );})}
        </div>
        <div className="card">
          <div className="card-header"><h3>Customer Groups</h3></div>
          {data.customerGroups.map((g,i)=>(
            <div key={i} style={{marginBottom:10}}><div style={{fontWeight:600,fontSize:13,color:'var(--primary)'}}>{g.name}</div><div style={{fontSize:12,color:'var(--text-secondary)'}}>{g.members.join(', ')}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── INVENTORY SCREEN ──
// ══════════════════════════
function InventoryScreen() {
  const {data,activeProducts,updateInventory,addInventory,getProductTotalSold,getProductAvailable,getProductSoldNotDelivered,getProductDelivered,showToast} = useApp();
  const [addModal,setAddModal] = useState(null);
  const [addDate,setAddDate] = useState(today());
  const [addQty,setAddQty] = useState('');
  const [addNote,setAddNote] = useState('');
  const [editModal,setEditModal] = useState(null);
  const [editVal,setEditVal] = useState('');
  // Bulk add state
  const [bulkModal,setBulkModal] = useState(false);
  const [bulkDate,setBulkDate] = useState(today());
  const [bulkNote,setBulkNote] = useState('');
  const [bulkSelected,setBulkSelected] = useState({});
  const [bulkQtys,setBulkQtys] = useState({});
  const {sortKey:invSK,sortDir:invSD,toggleSort:invToggle,sortFn:invSort} = useSort('name');

  const handleAdd=()=>{if(!addQty||isNaN(addQty))return;addInventory(addModal,{date:addDate,qty:parseFloat(addQty),note:addNote});setAddModal(null);setAddQty('');setAddNote('');showToast('Inventory added');};

  const invRows = useMemo(()=>{
    const rows=activeProducts.map(p=>{
      const inv=data.inventory[p.id]||{starting:0,additions:[]};const added=inv.additions.reduce((s,a)=>s+a.qty,0);
      return{...p,inv,added,sold:getProductTotalSold(p.id),delivered:getProductDelivered(p.id),snd:getProductSoldNotDelivered(p.id),avail:getProductAvailable(p.id)};
    });
    return invSort(rows,(r,k)=>{switch(k){case'name':return r.name;case'starting':return r.inv.starting;case'added':return r.added;case'sold':return r.sold;case'delivered':return r.delivered;case'snd':return r.snd;case'avail':return r.avail;default:return r.name;}});
  },[activeProducts,data.inventory,getProductTotalSold,getProductDelivered,getProductSoldNotDelivered,getProductAvailable,invSK,invSD]);

  const openBulkModal=()=>{setBulkModal(true);setBulkDate(today());setBulkNote('');setBulkSelected({});setBulkQtys({});};
  const toggleBulkProduct=(pid)=>{setBulkSelected(s=>({...s,[pid]:!s[pid]}));};
  const selectAllBulk=()=>{const all={};activeProducts.forEach(p=>{all[p.id]=true;});setBulkSelected(all);};
  const clearAllBulk=()=>{setBulkSelected({});setBulkQtys({});};
  const setBulkQty=(pid,val)=>{setBulkQtys(q=>({...q,[pid]:val}));};
  const selectedCount=Object.values(bulkSelected).filter(Boolean).length;
  const handleBulkAdd=()=>{
    let count=0;
    const entries=Object.entries(bulkSelected).filter(([_,v])=>v);
    entries.forEach(([pid])=>{
      const q=parseFloat(bulkQtys[pid]);
      if(q&&!isNaN(q)&&q>0){addInventory(pid,{date:bulkDate,qty:q,note:bulkNote||'Bulk addition'});count++;}
    });
    if(count===0){showToast('Enter quantities for selected products');return;}
    setBulkModal(false);showToast(count+' product'+(count>1?'s':'')+' updated');
  };

  return (
    <div className="fade-in">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h2>Inventory Management</h2><p>Track starting, added, and available inventory by product</p></div>
        <button className="btn btn-primary" onClick={openBulkModal}><Icon name="plus" size={14}/>Bulk Add Inventory</button>
      </div>
      <div className="card"><div className="inv-table-wrap"><table>
        <thead><tr><SortTh label="Product" colKey="name" sortKey={invSK} sortDir={invSD} onSort={invToggle}/><SortTh label="Starting" colKey="starting" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><SortTh label="Added" colKey="added" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><SortTh label="Total Sold" colKey="sold" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><SortTh label="Delivered" colKey="delivered" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><SortTh label="Sold, Not Delivered" colKey="snd" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><SortTh label="Available" colKey="avail" sortKey={invSK} sortDir={invSD} onSort={invToggle} style={{textAlign:'right'}}/><th></th></tr></thead>
        <tbody>{invRows.map(p=>{
          return <tr key={p.id}>
            <td style={{fontWeight:500}}>{p.name}</td>
            <td className="inv-cell" style={{cursor:'pointer',textDecoration:'underline dotted'}} onClick={()=>{setEditModal(p.id);setEditVal(p.inv.starting);}}>{fmt(p.inv.starting)}</td>
            <td className="inv-cell positive">{p.added>0?'+'+fmt(p.added):'—'}{p.inv.additions.length>0&&<div style={{fontSize:10,color:'#94a3b8'}}>{p.inv.additions.length} addition{p.inv.additions.length>1?'s':''}</div>}</td>
            <td className="inv-cell">{fmt(p.sold)}</td>
            <td className="inv-cell" style={{color:'var(--success)'}}>{fmt(p.delivered)}</td>
            <td className="inv-cell" style={{color:p.snd>0?'var(--warning)':'inherit',fontWeight:p.snd>0?600:400}}>{fmt(Math.max(0,p.snd))}</td>
            <td className={`inv-cell ${p.avail<0?'negative':'positive'}`} style={{fontWeight:700}}>{fmt(p.avail)}</td>
            <td><button className="btn btn-sm btn-secondary" onClick={()=>setAddModal(p.id)}><Icon name="plus" size={14}/>Add</button></td>
          </tr>;
        })}</tbody>
      </table></div></div>

      {/* Single product add modal */}
      {addModal&&<Modal title={`Add Inventory — ${ALL_PRODUCTS.find(p=>p.id===addModal)?.name}`} onClose={()=>setAddModal(null)}>
        <div className="modal-body">
          <div className="form-group"><label>Date</label><input type="date" value={addDate} onChange={e=>setAddDate(e.target.value)}/></div>
          <div className="form-group"><label>Quantity</label><input type="number" step="0.1" placeholder="Enter quantity" value={addQty} onChange={e=>setAddQty(e.target.value)}/></div>
          <div className="form-group"><label>Note (optional)</label><input placeholder="e.g., Restock from supplier" value={addNote} onChange={e=>setAddNote(e.target.value)}/></div>
          {(data.inventory[addModal]?.additions||[]).length>0&&<div style={{marginTop:16}}><h4 style={{fontSize:13,fontWeight:600,marginBottom:8}}>Addition History</h4><table><thead><tr><th>Date</th><th>Qty</th><th>Note</th></tr></thead><tbody>{(data.inventory[addModal]?.additions||[]).map((a,i)=><tr key={i}><td>{fmtDate(a.date)}</td><td>{fmt(a.qty)}</td><td>{a.note||'—'}</td></tr>)}</tbody></table></div>}
        </div>
        <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setAddModal(null)}>Cancel</button><button className="btn btn-primary" onClick={handleAdd}>Add Inventory</button></div>
      </Modal>}

      {/* Bulk add modal */}
      {bulkModal&&<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setBulkModal(false);}}>
        <div className="modal" style={{maxWidth:700}}>
          <div className="modal-header"><h3>Bulk Add Inventory</h3><button className="btn-icon" onClick={()=>setBulkModal(false)}><Icon name="x" size={16}/></button></div>
          <div className="modal-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              <div className="form-group"><label>Date</label><input type="date" value={bulkDate} onChange={e=>setBulkDate(e.target.value)}/></div>
              <div className="form-group"><label>Note (optional)</label><input placeholder="e.g., Spring restock" value={bulkNote} onChange={e=>setBulkNote(e.target.value)}/></div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text-secondary)'}}>{selectedCount} product{selectedCount!==1?'s':''} selected</span>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-sm btn-secondary" onClick={selectAllBulk}>Select All</button>
                <button className="btn btn-sm btn-secondary" onClick={clearAllBulk}>Clear All</button>
              </div>
            </div>
            <div style={{maxHeight:400,overflowY:'auto',border:'1px solid var(--border)',borderRadius:6}}>
              <table>
                <thead><tr><th style={{width:36}}></th><th>Product</th><th style={{textAlign:'right',width:100}}>Current</th><th style={{width:120}}>Add Qty</th></tr></thead>
                <tbody>{activeProducts.map(p=>{
                  const inv=data.inventory[p.id]||{starting:0,additions:[]};
                  const added=inv.additions.reduce((s,a)=>s+a.qty,0);
                  const avail=getProductAvailable(p.id);
                  const sel=!!bulkSelected[p.id];
                  return <tr key={p.id} style={{background:sel?'var(--primary-bg)':'transparent',cursor:'pointer'}} onClick={()=>toggleBulkProduct(p.id)}>
                    <td style={{textAlign:'center'}}><input type="checkbox" checked={sel} onChange={()=>toggleBulkProduct(p.id)} onClick={e=>e.stopPropagation()} style={{width:'auto',cursor:'pointer'}}/></td>
                    <td style={{fontWeight:500}}>{p.name}</td>
                    <td className={`inv-cell ${avail<0?'negative':'positive'}`} style={{fontWeight:600}}>{fmt(avail)}</td>
                    <td onClick={e=>e.stopPropagation()}><input type="number" step="0.1" placeholder="0" disabled={!sel} value={bulkQtys[p.id]||''} onChange={e=>setBulkQty(p.id,e.target.value)} style={{opacity:sel?1:0.4,textAlign:'right',padding:'5px 8px'}}/></td>
                  </tr>;
                })}</tbody>
              </table>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn btn-secondary" onClick={()=>setBulkModal(false)}>Cancel</button>
            <button className="btn btn-primary" disabled={selectedCount===0} onClick={handleBulkAdd}><Icon name="plus" size={14}/>Add to {selectedCount} Product{selectedCount!==1?'s':''}</button>
          </div>
        </div>
      </div>}

      {/* Edit starting inventory modal */}
      {editModal&&<Modal title={`Edit Starting Inventory — ${ALL_PRODUCTS.find(p=>p.id===editModal)?.name}`} onClose={()=>setEditModal(null)}>
        <div className="modal-body"><div className="form-group"><label>Starting Inventory</label><input type="number" step="0.1" value={editVal} onChange={e=>setEditVal(e.target.value)}/></div></div>
        <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setEditModal(null)}>Cancel</button><button className="btn btn-primary" onClick={()=>{updateInventory(editModal,'starting',parseFloat(editVal)||0);setEditModal(null);showToast('Updated');}}>Save</button></div>
      </Modal>}
    </div>
  );
}

function OrdersScreen({onNavigate}) {

  const [showAdd,setShowAdd] = useState(false);
  const [filter,setFilter] = useState('all');
  const [search,setSearch] = useState('');
  const [editOrder,setEditOrder] = useState(null);
  const [showArchived,setShowArchived] = useState(false);
  const [viewMode,setViewMode] = useState('list'); // 'list' or 'matrix'
  const {sortKey:olSK,sortDir:olSD,toggleSort:olToggle,sortFn:olSort} = useSort(null);
  const {sortKey:mSK,sortDir:mSD,toggleSort:mToggle,sortFn:mSort} = useSort('customer');

  const allYears = showArchived ? [...visibleYears,...archivedYears].sort().reverse() : visibleYears;

  const filtered = useMemo(()=>{
    let orders=[...yearOrders];
    if(filter!=='all')orders=orders.filter(o=>o.status===filter);
    if(search)orders=orders.filter(o=>o.customer.toLowerCase().includes(search.toLowerCase()));
    if(!olSK) orders.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    else orders=olSort(orders,(o,k)=>{switch(k){case'customer':return o.customer;case'date':return o.date||'';case'products':return Object.keys(o.products).filter(x=>o.products[x]>0).length;case'status':return o.status;case'invoiced':return o.invoiced?1:0;default:return o.customer;}});
    return orders;
  },[yearOrders,filter,search,olSK,olSD]);

  // Spreadsheet view: determine which products are used across all visible orders
  const spreadsheetProducts = useMemo(()=>{
    const used=new Set();
    yearOrders.forEach(o=>Object.keys(o.products).forEach(pid=>{if(o.products[pid]>0)used.add(pid);}));
    return ALL_PRODUCTS.filter(p=>used.has(p.id));
  },[yearOrders]);

  // Group orders by customer for spreadsheet view, aggregate if multiple orders per customer
  const spreadsheetRows = useMemo(()=>{
    const map={};
    const fOrders = filter!=='all' ? yearOrders.filter(o=>o.status===filter) : yearOrders;
    const sOrders = search ? fOrders.filter(o=>o.customer.toLowerCase().includes(search.toLowerCase())) : fOrders;
    sOrders.forEach(o=>{
      if(!map[o.customer]) map[o.customer]={customer:o.customer,products:{},status:o.status,orderCount:0};
      map[o.customer].orderCount++;
      Object.entries(o.products).forEach(([pid,qty])=>{if(qty>0)map[o.customer].products[pid]=(map[o.customer].products[pid]||0)+qty;});
    });
    const rows=Object.values(map);
    return mSort(rows,(r,k)=>{if(k==='customer')return r.customer;if(k==='status')return r.status;const p=spreadsheetProducts.find(x=>x.id===k);return p?r.products[k]||0:r.customer;});
  },[yearOrders,filter,search,mSK,mSD]);

  // Column totals for spreadsheet
  const colTotals = useMemo(()=>{
    const t={};spreadsheetProducts.forEach(p=>{t[p.id]=spreadsheetRows.reduce((s,r)=>s+(r.products[p.id]||0),0);});return t;
  },[spreadsheetProducts,spreadsheetRows]);

  return (
    <div className="fade-in">
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h2>Orders</h2><p>{yearOrders.length} orders in {activeYear}</p></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <select value={activeYear} onChange={e=>setActiveYear(e.target.value)} style={{width:'auto',padding:'6px 10px',fontSize:13,fontWeight:600}}>
            {allYears.map(y=><option key={y} value={y}>{y}{archivedYears.includes(y)?' (Archived)':''}</option>)}
          </select>
          <button className="btn btn-sm btn-secondary" onClick={()=>setShowArchived(!showArchived)}><Icon name="archive" size={14}/>{showArchived?'Hide':'Show'} Archived</button>
          <button className="btn btn-primary" onClick={()=>setShowAdd(true)}><Icon name="plus" size={16}/>New Order</button>
        </div>
      </div>

      {/* View toggle */}
      <div className="card" style={{padding:'12px 16px',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:0,border:'1px solid var(--border)',borderRadius:6,overflow:'hidden',marginRight:8}}>
          <button onClick={()=>setViewMode('list')} style={{padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:viewMode==='list'?'var(--primary)':'#fff',color:viewMode==='list'?'#fff':'var(--text-secondary)',transition:'all .15s',display:'flex',alignItems:'center',gap:4}}><Icon name="list" size={14}/>List</button>
          <button onClick={()=>setViewMode('matrix')} style={{padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',borderLeft:'1px solid var(--border)',background:viewMode==='matrix'?'var(--primary)':'#fff',color:viewMode==='matrix'?'#fff':'var(--text-secondary)',transition:'all .15s',display:'flex',alignItems:'center',gap:4}}><Icon name="grid" size={14}/>Matrix</button>
        </div>
        <div className="search-box" style={{flex:1,minWidth:200}}><Icon name="search"/><input placeholder="Search customers..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        {viewMode==='list'&&<div className="chip-select">
          <span className={`chip ${filter==='all'?'selected':''}`} onClick={()=>setFilter('all')}>All</span>
          {STATUS_OPTIONS.map(s=><span key={s.value} className={`chip ${filter===s.value?'selected':''}`} onClick={()=>setFilter(s.value)}>{s.label}</span>)}
        </div>}
      </div>

      {/* List View */}
      {viewMode==='list'&&<div className="card" style={{padding:0}}><div className="inv-table-wrap"><table>
        <thead><tr><SortTh label="Customer" colKey="customer" sortKey={olSK} sortDir={olSD} onSort={olToggle}/><SortTh label="Order Date" colKey="date" sortKey={olSK} sortDir={olSD} onSort={olToggle}/><SortTh label="Products" colKey="products" sortKey={olSK} sortDir={olSD} onSort={olToggle}/><SortTh label="Status" colKey="status" sortKey={olSK} sortDir={olSD} onSort={olToggle}/><SortTh label="Invoiced" colKey="invoiced" sortKey={olSK} sortDir={olSD} onSort={olToggle}/><th></th></tr></thead>
        <tbody>{filtered.length===0?<tr><td colSpan="6" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No orders found</td></tr>:filtered.map(o=>{
          const st=getStatus(o.status);const pc=Object.keys(o.products).filter(k=>o.products[k]>0).length;
          return <tr key={o.id} style={{cursor:'pointer'}} onClick={()=>setEditOrder(o)}>
            <td style={{fontWeight:500}}>{o.customer}</td><td>{fmtDate(o.date)}</td><td><span className="tag">{pc} product{pc!==1?'s':''}</span></td>
            <td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td>
            <td>{o.invoiced?<span style={{color:'var(--success)'}}>Yes</span>:'No'}</td>
            <td style={{textAlign:'right'}}><button className="btn-icon" style={{marginRight:4}} onClick={e=>{e.stopPropagation();setEditOrder(o);}}><Icon name="edit" size={14}/></button><button className="btn-icon" onClick={e=>{e.stopPropagation();if(confirm('Delete?'))deleteOrder(o.id);}}><Icon name="trash" size={14}/></button></td>
          </tr>;
        })}</tbody>
      </table></div></div>}

      {/* Spreadsheet View (BWF Order Forecast style) */}
      {viewMode==='matrix'&&<div className="card spreadsheet-wrap">
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h3 style={{fontSize:14,fontWeight:600}}>BWF Order Forecast — {activeYear}</h3>
          <span style={{fontSize:12,color:'var(--text-secondary)'}}>{spreadsheetRows.length} customers, {spreadsheetProducts.length} products</span>
        </div>
        <div className="spreadsheet-scroll">
          <table style={{fontSize:11}}>
            <colgroup>
              <col style={{width:180}}/>
              <col style={{width:50}}/>
              {spreadsheetProducts.map(p=><col key={p.id} style={{width:95}}/>)}
            </colgroup>
            <thead>
              <tr style={{position:'sticky',top:0,zIndex:2,background:'#f8fafc'}}>
                <SortTh label="Customer" colKey="customer" sortKey={mSK} sortDir={mSD} onSort={mToggle} style={{position:'sticky',left:0,background:'#f8fafc',zIndex:3,whiteSpace:'nowrap'}}/>
                <SortTh label="Status" colKey="status" sortKey={mSK} sortDir={mSD} onSort={mToggle} style={{textAlign:'center'}}/>
                {spreadsheetProducts.map(p=><SortTh key={p.id} label={p.name} colKey={p.id} sortKey={mSK} sortDir={mSD} onSort={mToggle} style={{textAlign:'right',fontSize:10,padding:'8px 6px',whiteSpace:'nowrap'}}/>)}
              </tr>
            </thead>
            <tbody>
              {spreadsheetRows.length===0?<tr><td colSpan={spreadsheetProducts.length+2} style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No orders found</td></tr>:spreadsheetRows.map((r,ri)=>{
                const st=getStatus(r.status);const bg=ri%2===0?'#fff':'#f8fafc';
                return <tr key={r.customer} style={{cursor:'pointer',background:bg}} onClick={()=>{const o=yearOrders.find(o2=>o2.customer===r.customer);if(o)setEditOrder(o);}}>
                  <td style={{fontWeight:500,position:'sticky',left:0,background:bg,zIndex:1,borderRight:'2px solid var(--border)',whiteSpace:'nowrap',padding:'6px 10px'}}>{r.customer}{r.orderCount>1&&<span style={{fontSize:9,color:'var(--text-secondary)',marginLeft:4}}>({r.orderCount})</span>}</td>
                  <td style={{textAlign:'center'}}><span className={`status-dot ${st.dot}`} title={st.label} style={{display:'inline-block'}}></span></td>
                  {spreadsheetProducts.map(p=>{const v=r.products[p.id];return <td key={p.id} className="inv-cell" style={{fontSize:11,padding:'6px 8px',color:v?'var(--text)':'#cbd5e1'}}>{v?fmt(v):'—'}</td>;})}
                </tr>;
              })}
              <tr style={{fontWeight:700,background:'#f0f9ff',position:'sticky',bottom:0,zIndex:2}}>
                <td style={{position:'sticky',left:0,background:'#f0f9ff',zIndex:3,borderRight:'2px solid var(--border)',fontWeight:700,borderTop:'2px solid var(--primary)',padding:'6px 10px'}}>TOTALS</td>
                <td style={{background:'#f0f9ff',borderTop:'2px solid var(--primary)'}}></td>
                {spreadsheetProducts.map(p=><td key={p.id} className="inv-cell" style={{fontWeight:700,fontSize:11,padding:'6px 8px',background:'#f0f9ff',borderTop:'2px solid var(--primary)'}}>{colTotals[p.id]?fmt(colTotals[p.id]):'—'}</td>)}
              </tr>
            </tbody>
          </table>
        </div>
      </div>}

      {(showAdd||editOrder)&&<OrderModal order={editOrder} onClose={()=>{setShowAdd(false);setEditOrder(null);}}/>}
    </div>
  );
}

function OrderModal({order,onClose}) {
  const {addOrder,updateOrder,showToast} = useApp();
  const [customer,setCustomer] = useState(order?.customer||'');
  const [date,setDate] = useState(order?.date||today());
  const [status,setStatus] = useState(order?.status||'pending');
  const [invoiced,setInvoiced] = useState(order?.invoiced||false);
  const [products,setProducts] = useState(order?.products||{});
  const [custSearch,setCustSearch] = useState('');
  const [showAllProducts,setShowAllProducts] = useState(false);
  const filteredCust=ALL_CUSTOMERS.filter(c=>c.toLowerCase().includes(custSearch.toLowerCase()));
  const setProduct=(pid,val)=>{const v=parseFloat(val)||0;setProducts(p=>v>0?{...p,[pid]:v}:Object.fromEntries(Object.entries(p).filter(([k])=>k!==pid)));};
  const save=()=>{if(!customer){alert('Select a customer');return;}if(Object.keys(products).length===0){alert('Add at least one product');return;}if(order){updateOrder(order.id,{customer,date,status,invoiced,products});showToast('Order updated');}else addOrder({customer,date,status,invoiced,products});onClose();};
  return <Modal title={order?'Edit Order':'New Order'} onClose={onClose} wide>
    <div className="modal-body">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="form-group"><label>Customer</label>{order?<input value={customer} readOnly style={{background:'#f8fafc'}}/>:<div><input placeholder="Search customer..." value={custSearch} onChange={e=>{setCustSearch(e.target.value);if(!customer)setCustomer('');}}/>
          {custSearch&&!customer&&<div style={{border:'1px solid var(--border)',borderRadius:6,maxHeight:150,overflowY:'auto',marginTop:4}}>{filteredCust.slice(0,10).map(c=><div key={c} style={{padding:'6px 12px',cursor:'pointer',fontSize:13}} onClick={()=>{setCustomer(c);setCustSearch(c);}} onMouseEnter={e=>e.target.style.background='#f1f5f9'} onMouseLeave={e=>e.target.style.background=''}>{c}</div>)}</div>}
        </div>}</div>
        <div className="form-group"><label>Order Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="form-group"><label>Status</label><select value={status} onChange={e=>setStatus(e.target.value)}>{STATUS_OPTIONS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select></div>
        <div className="form-group" style={{display:'flex',alignItems:'flex-end',paddingBottom:8}}><label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}><input type="checkbox" checked={invoiced} onChange={e=>setInvoiced(e.target.checked)} style={{width:'auto'}}/>Invoiced</label></div>
      </div>
      <h4 style={{fontSize:14,fontWeight:600,margin:'16px 0 8px'}}>Products & Quantities</h4>
      {order&&<div style={{marginBottom:8}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
          {ALL_PRODUCTS.filter(p=>products[p.id]>0).map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span><input type="number" step="0.1" style={{width:80}} placeholder="0" value={products[p.id]||''} onChange={e=>setProduct(p.id,e.target.value)}/></div>)}
        </div>
        {showAllProducts?<div style={{marginTop:8,paddingTop:8,borderTop:'1px dashed var(--border)'}}>
          <p style={{fontSize:11,color:'var(--text-secondary)',marginBottom:6}}>Add more products:</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
            {ALL_PRODUCTS.filter(p=>!products[p.id]||products[p.id]<=0).map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text-secondary)'}}>{p.name}</span><input type="number" step="0.1" style={{width:80}} placeholder="0" value={products[p.id]||''} onChange={e=>setProduct(p.id,e.target.value)}/></div>)}
          </div>
        </div>:<button className="btn btn-sm btn-secondary" style={{marginTop:8}} onClick={()=>setShowAllProducts(true)}><Icon name="plus" size={14}/>Add More Products</button>}
      </div>}
      {!order&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:8}}>
        {ALL_PRODUCTS.map(p=><div key={p.id} style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span><input type="number" step="0.1" style={{width:80}} placeholder="0" value={products[p.id]||''} onChange={e=>setProduct(p.id,e.target.value)}/></div>)}
      </div>}
    </div>
    <div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={save}>{order?'Save Changes':'Create Order'}</button></div>
  </Modal>;
}

// ── CUSTOMERS SCREEN ──

function CustomersScreen({onNavigate}) {
  const {data,activeCustomers} = useApp();
  const [search,setSearch] = useState('');
  const {sortKey:cSK,sortDir:cSD,toggleSort:cToggle,sortFn:cSort} = useSort('name');
  const customerData=useMemo(()=>activeCustomers.map(name=>{
    const orders=data.orders.filter(o=>o.customer===name);const tp={};orders.forEach(o=>{Object.entries(o.products).forEach(([pid,qty])=>{tp[pid]=(tp[pid]||0)+qty;});});
    const group=data.customerGroups.find(g=>g.members.includes(name));const latest=orders.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))[0];
    return{name,orders,totalProducts:tp,group:group?.name||null,latest,latestDate:latest?.date||'',latestStatus:latest?latest.status:'pending'};
  }).filter(c=>c.name.toLowerCase().includes(search.toLowerCase())),[activeCustomers,data,search]);

  const sortedCustomers=useMemo(()=>cSort(customerData,(c,k)=>{switch(k){case'name':return c.name;case'group':return c.group||'';case'orders':return c.orders.length;case'latest':return c.latestDate;case'status':return c.latestStatus;default:return c.name;}}),[customerData,cSK,cSD]);

  const groupData=useMemo(()=>data.customerGroups.map(g=>{
    const members=sortedCustomers.filter(c=>g.members.includes(c.name));const tp={};members.forEach(m=>{Object.entries(m.totalProducts).forEach(([pid,qty])=>{tp[pid]=(tp[pid]||0)+qty;});});
    return{...g,members,totalProducts:tp};
  }),[data.customerGroups,sortedCustomers]);

  return <div className="fade-in">
    <div className="page-header"><h2>Customers</h2><p>View customer orders and group totals</p></div>
    <div className="card" style={{padding:'12px 16px'}}><div className="search-box"><Icon name="search"/><input placeholder="Search customers..." value={search} onChange={e=>setSearch(e.target.value)}/></div></div>
    {groupData.map(g=><div key={g.name} className="card"><div className="card-header"><h3 style={{color:'var(--primary)'}}>{g.name} Group</h3><span className="tag">{g.members.length} members</span></div>
      <table><thead><tr><SortTh label="Customer" colKey="name" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Orders" colKey="orders" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Latest Date" colKey="latest" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Status" colKey="status" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><th></th></tr></thead><tbody>
        {g.members.map(m=>{const st=m.latest?getStatus(m.latest.status):getStatus('pending');return <tr key={m.name} style={{cursor:'pointer'}} onClick={()=>onNavigate('customer-detail',m.name)}><td style={{fontWeight:500}}>{m.name}</td><td>{m.orders.length}</td><td>{m.latest?fmtDate(m.latest.date):'—'}</td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td><td style={{textAlign:'right'}}><Icon name="chevron" size={16}/></td></tr>;})}
        <tr className="group-row"><td>{g.name} Total</td><td>{g.members.reduce((s,m)=>s+m.orders.length,0)}</td><td colSpan="3">{Object.entries(g.totalProducts).filter(([,v])=>v>0).slice(0,5).map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <span key={pid} className="tag" style={{marginRight:4}}>{p?.name}: {fmt(qty)}</span>;})}</td></tr>
      </tbody></table>
    </div>)}
    <div className="card"><div className="card-header"><h3>All Customers</h3></div><table><thead><tr><SortTh label="Customer" colKey="name" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Group" colKey="group" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Orders" colKey="orders" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Latest" colKey="latest" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><SortTh label="Status" colKey="status" sortKey={cSK} sortDir={cSD} onSort={cToggle}/><th></th></tr></thead><tbody>
      {sortedCustomers.map(c=>{const st=c.latest?getStatus(c.latest.status):getStatus('pending');return <tr key={c.name} style={{cursor:'pointer'}} onClick={()=>onNavigate('customer-detail',c.name)}><td style={{fontWeight:500}}>{c.name}</td><td>{c.group?<span className="tag" style={{background:'var(--primary-bg)',color:'var(--primary)'}}>{c.group}</span>:'—'}</td><td>{c.orders.length}</td><td>{c.latest?fmtDate(c.latest.date):'—'}</td><td><span className={`status-badge ${st.cls}`}><span className={`status-dot ${st.dot}`}></span>{st.label}</span></td><td style={{textAlign:'right'}}><Icon name="chevron" size={16}/></td></tr>;})}
    </tbody></table></div>
  </div>;
}

function CustomerDetail({customerName,onBack}) {
  const {data,updateOrder} = useApp();
  const orders=data.orders.filter(o=>o.customer===customerName);const group=data.customerGroups.find(g=>g.members.includes(customerName));const deliveries=data.deliveries.filter(d=>d.customer===customerName);
  const tp={};orders.forEach(o=>{Object.entries(o.products).forEach(([pid,qty])=>{tp[pid]=(tp[pid]||0)+qty;});});
  const usedProducts=ALL_PRODUCTS.filter(p=>tp[p.id]>0);
  return <div className="fade-in">
    <div className="page-header" style={{display:'flex',alignItems:'center',gap:12}}><button className="btn-icon" onClick={onBack}><Icon name="back"/></button><div><h2>{customerName}</h2><p>{group?<span className="tag" style={{background:'var(--primary-bg)',color:'var(--primary)'}}>{group.name} Group</span>:null} {orders.length} order{orders.length!==1?'s':''}</p></div></div>
    <div className="card"><div className="card-header"><h3>Orders</h3></div><div className="inv-table-wrap"><table>
      <thead><tr><th>Date</th><th>Status</th>{usedProducts.map(p=><th key={p.id} className="product-col" style={{textAlign:'right',fontSize:10}}>{p.name}</th>)}</tr></thead>
      <tbody>{orders.map(o=><tr key={o.id}><td>{fmtDate(o.date)}</td><td><select value={o.status} onChange={e=>updateOrder(o.id,{status:e.target.value})} style={{width:'auto',padding:'3px 6px',fontSize:11}}>{STATUS_OPTIONS.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select></td>{usedProducts.map(p=><td key={p.id} className="inv-cell">{o.products[p.id]?fmt(o.products[p.id]):'—'}</td>)}</tr>)}
        <tr style={{fontWeight:700,background:'#f0f9ff'}}><td colSpan="2">Customer Total</td>{usedProducts.map(p=><td key={p.id} className="inv-cell" style={{fontWeight:700}}>{tp[p.id]?fmt(tp[p.id]):'—'}</td>)}</tr>
      </tbody>
    </table></div></div>
    {deliveries.length>0&&<div className="card"><div className="card-header"><h3>Delivery History</h3></div><table><thead><tr><th>Date</th><th>Products</th><th>Pumps Out</th><th>Totes</th><th>Attachments</th></tr></thead><tbody>
      {deliveries.map(d=><tr key={d.id}><td>{fmtDate(d.date)}</td><td>{Object.entries(d.products||{}).filter(([,v])=>v>0).map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <span key={pid} className="tag" style={{marginRight:4}}>{p?.name}: {fmt(qty)}</span>;})}</td><td>{d.pumpsOut||'—'}{d.pumpsReturnDate?` (return: ${fmtDate(d.pumpsReturnDate)})`:''}</td><td>{d.totes||'—'}{d.totesReturned?' (returned)':d.totes?' (out)':''}</td><td>{(d.attachments||[]).length>0?<span className="tag">{d.attachments.length} file{d.attachments.length>1?'s':''}</span>:'—'}</td></tr>)}
    </tbody></table></div>}
  </div>;
}

function DeliveriesScreen({onNavigate}) {
  const {data,updateDelivery,showToast} = useApp();
  const [showNew,setShowNew] = useState(false);
  const [showTicket,setShowTicket] = useState(null);
  const [tab,setTab] = useState('deliveries');
  const {sortKey:dSK,sortDir:dSD,toggleSort:dToggle,sortFn:dSort} = useSort(null);
  const activePumps=data.deliveries.filter(d=>d.pumpsOut>0&&!d.pumpsReturned);
  const activeTotes=data.deliveries.filter(d=>d.totes>0&&!d.totesReturned);

  const sortedDeliveries=useMemo(()=>{
    if(!dSK) return [...data.deliveries].sort((a,b)=>new Date(b.date)-new Date(a.date));
    return dSort(data.deliveries,(d,k)=>{switch(k){case'customer':return d.customer;case'date':return d.date||'';case'products':return Object.keys(d.products||{}).filter(x=>(d.products||{})[x]>0).length;case'pumps':return d.pumpsOut||0;case'totes':return d.totes||0;case'photos':return (d.attachments||[]).length;default:return d.customer;}});
  },[data.deliveries,dSK,dSD]);
  const sortedPumps=useMemo(()=>dSort(activePumps,(d,k)=>{switch(k){case'customer':return d.customer;case'date':return d.date||'';case'pumps':return d.pumpsOut||0;case'returnDate':return d.pumpsReturnDate||'';default:return d.customer;}}),[activePumps,dSK,dSD]);
  const sortedTotes=useMemo(()=>dSort(activeTotes,(d,k)=>{switch(k){case'customer':return d.customer;case'date':return d.date||'';case'totes':return d.totes||0;default:return d.customer;}}),[activeTotes,dSK,dSD]);
  const sortedTickets=useMemo(()=>dSort(data.deliveryTickets||[],(t,k)=>{switch(k){case'customer':return t.customer;case'date':return t.date||'';case'savedAt':return t.savedAt||'';case'products':return t.productCount||0;default:return t.customer;}}),[data.deliveryTickets,dSK,dSD]);

  return <div className="fade-in">
    <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div><h2>Deliveries</h2><p>Manage deliveries, pumps, and totes</p></div>
      <button className="btn btn-primary" onClick={()=>setShowNew(true)}><Icon name="truck" size={16}/>New Delivery</button>
    </div>
    <div className="tabs">
      <div className={`tab ${tab==='deliveries'?'active':''}`} onClick={()=>setTab('deliveries')}>Deliveries ({data.deliveries.length})</div>
      <div className={`tab ${tab==='pumps'?'active':''}`} onClick={()=>setTab('pumps')}>Pumps Out ({activePumps.length})</div>
      <div className={`tab ${tab==='totes'?'active':''}`} onClick={()=>setTab('totes')}>Totes Out ({activeTotes.length})</div>
      <div className={`tab ${tab==='tickets'?'active':''}`} onClick={()=>setTab('tickets')}>Saved Tickets ({data.deliveryTickets?.length||0})</div>
    </div>
    {tab==='deliveries'&&<div className="card" style={{padding:0}}><table><thead><tr><SortTh label="Customer" colKey="customer" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Date" colKey="date" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Products" colKey="products" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Pumps" colKey="pumps" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Totes" colKey="totes" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Photos" colKey="photos" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><th></th></tr></thead><tbody>
      {sortedDeliveries.length===0?<tr><td colSpan="7" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No deliveries recorded yet</td></tr>:sortedDeliveries.map(d=>{
        const delCount=data.deliveries.filter(x=>x.orderId===d.orderId).length;
        const delIdx=data.deliveries.filter(x=>x.orderId===d.orderId).findIndex(x=>x.id===d.id)+1;
        return <tr key={d.id}>
        <td style={{fontWeight:500}}>{d.customer}{delCount>1&&<span className="tag" style={{marginLeft:6,fontSize:10}}>#{delIdx} of {delCount}</span>}</td><td>{fmtDate(d.date)}</td>
        <td>{Object.entries(d.products||{}).filter(([,v])=>v>0).slice(0,3).map(([pid,qty])=>{const p=ALL_PRODUCTS.find(x=>x.id===pid);return <span key={pid} className="tag" style={{marginRight:4}}>{p?.name?.split('-')[0]?.trim()}: {fmt(qty)}</span>;})}</td>
        <td>{d.pumpsOut||'—'}</td><td>{d.totes||'—'}{d.totesReturned?' (in)':''}</td>
        <td>{(d.attachments||[]).length>0?<span className="tag">{d.attachments.length}</span>:'—'}</td>
        <td><button className="btn btn-sm btn-secondary" onClick={()=>setShowTicket(d)}><Icon name="printer" size={14}/>Ticket</button></td>
      </tr>;})}
    </tbody></table></div>}
    {tab==='pumps'&&<div className="card" style={{padding:0}}><table><thead><tr><SortTh label="Customer" colKey="customer" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Delivery Date" colKey="date" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Pumps Out" colKey="pumps" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Return Date" colKey="returnDate" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><th></th></tr></thead><tbody>
      {sortedPumps.length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No pumps currently out</td></tr>:sortedPumps.map(d=><tr key={d.id}><td style={{fontWeight:500}}>{d.customer}</td><td>{fmtDate(d.date)}</td><td style={{fontWeight:600}}>{d.pumpsOut}</td><td>{d.pumpsReturnDate?fmtDate(d.pumpsReturnDate):'Not set'}</td>
        <td><button className="btn btn-sm btn-success" onClick={()=>{updateDelivery(d.id,{pumpsReturned:true,pumpsReturnedDate:today()});showToast('Pumps returned');}}><Icon name="check" size={14}/>Return</button></td></tr>)}
    </tbody></table></div>}
    {tab==='totes'&&<div className="card" style={{padding:0}}><table><thead><tr><SortTh label="Customer" colKey="customer" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Delivery Date" colKey="date" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Totes" colKey="totes" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><th>Status</th><th></th></tr></thead><tbody>
      {sortedTotes.length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No totes currently out</td></tr>:sortedTotes.map(d=><tr key={d.id}><td style={{fontWeight:500}}>{d.customer}</td><td>{fmtDate(d.date)}</td><td style={{fontWeight:600}}>{d.totes}</td><td><span className="status-badge status-partial-deliver"><span className="status-dot dot-partial-deliver"></span>Out</span></td>
        <td><button className="btn btn-sm btn-success" onClick={()=>{updateDelivery(d.id,{totesReturned:true,totesReturnedDate:today()});showToast('Totes checked in');}}><Icon name="check" size={14}/>Check In</button></td></tr>)}
    </tbody></table></div>}
    {tab==='tickets'&&<div className="card" style={{padding:0}}><table><thead><tr><SortTh label="Customer" colKey="customer" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Delivery Date" colKey="date" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Saved On" colKey="savedAt" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><SortTh label="Products" colKey="products" sortKey={dSK} sortDir={dSD} onSort={dToggle}/><th></th></tr></thead><tbody>
      {sortedTickets.length===0?<tr><td colSpan="5" style={{textAlign:'center',padding:40,color:'var(--text-secondary)'}}>No saved tickets yet. Tickets are saved when you generate a delivery.</td></tr>:sortedTickets.map(t=><tr key={t.id}><td style={{fontWeight:500}}>{t.customer}</td><td>{fmtDate(t.date)}</td><td>{fmtDate(t.savedAt)}</td><td>{t.productCount} products</td>
        <td><button className="btn btn-sm btn-secondary" onClick={()=>setShowTicket(t)}><Icon name="printer" size={14}/>View</button></td></tr>)}
    </tbody></table></div>}
    {showNew&&<NewDeliveryModal onClose={()=>setShowNew(false)}/>}
    {showTicket&&<DeliveryTicketModal delivery={showTicket} onClose={()=>setShowTicket(null)}/>}
  </div>;
}
